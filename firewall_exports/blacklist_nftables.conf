# NETSHIELD Blacklist – nftables
# Aktualisiert: 2026-03-08 17:41 UTC | Eintraege: 0
# Verwendung: nft -f blacklist_nftables.conf

table inet netshield {
    set blacklist_ipv4 {
        type ipv4_addr
        flags interval
        elements = {
        }
    }

    chain input {
        type filter hook input priority 0; policy accept;
        ip saddr @blacklist_ipv4 drop
    }

    chain forward {
        type filter hook forward priority 0; policy accept;
        ip saddr @blacklist_ipv4 drop
    }
}
