name: Feed Health Monitor

on:
  schedule:
    - cron: '0 1 * * *'    # täglich 01:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none


concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  feed-health:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Test all Feed URLs
        run: |
          python3 << 'EOF'
          import sys as _sys; _sys.path.insert(0, "scripts")
          from netshield_common import (
              load_whitelist, load_fp_set, is_in_fp_set,
              is_valid_public_ipv4, is_valid_public_cidr,
              is_protected_entry, is_whitelisted,
              parse_entries as _parse_entries, calculate_confidence,
              safe_get_date, parse_date, sort_ips, write_ip_list,

              write_text_atomic, write_json_atomic,
              fetch_url, check_local_feed_age,
              IPV4_RE, CIDR_RE, TIMESTAMP_RE,
          )

          # Init: Whitelist + FP-Set laden
          load_whitelist()
          load_fp_set()

          import pathlib
          import urllib.request, urllib.error, time, re, json, os
          from datetime import datetime, timezone
          from concurrent.futures import ThreadPoolExecutor, as_completed

          now     = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")

          # ── Feed-Liste dynamisch aus update_combined_blacklist.yml extrahieren ──
          # Single Source of Truth: kein doppelt gepflegter FEEDS-Dict mehr.
          # SOURCES in combined speichert Tuples ("url", hq_bool) → nur URLs werden
          # für den Health-Check benötigt. LOCAL_FEEDS sind Dateinamen (*.txt), keine
          # URL-Quellen – sie werden automatisch ausgeschlossen, da sie nicht in
          # SOURCES enthalten sind.

          def _extract_feeds_from_combined(workflow_path=".github/workflows/update_combined_blacklist.yml"):
              """Liest SOURCES aus update_combined_blacklist.yml und gibt {name: url} zurück."""
              text = pathlib.Path(workflow_path).read_text(encoding="utf-8")

              # SOURCES = { ... } per Brace-Counting isolieren (robust gegen Kommentare)
              m = re.search(r'^\s+SOURCES\s*=\s*\{', text, re.MULTILINE)
              if not m:
                  raise ValueError("SOURCES-Block nicht in update_combined_blacklist.yml gefunden")

              brace_start = m.start() + m.group().index('{')
              depth = 0
              brace_end = brace_start
              for i, ch in enumerate(text[brace_start:], brace_start):
                  if ch == '{':
                      depth += 1
                  elif ch == '}':
                      depth -= 1
                      if depth == 0:
                          brace_end = i + 1
                          break
              else:
                  raise ValueError("SOURCES-Block: schließende } nicht gefunden")

              raw = text[brace_start:brace_end]

              # Zeilenweise parsen statt ast.literal_eval: robust gegen Kommentare
              # innerhalb des SOURCES-Dicts in update_combined_blacklist.yml.
              feed_re = re.compile(
                  r'^[ \t]*"([^"\n]+)"\s*:\s*\(\s*"([^"\n]+)"\s*,\s*(True|False)\s*\)\s*,?',
                  re.MULTILINE,
              )
              sources = {}
              for m in feed_re.finditer(raw):
                  sources[m.group(1)] = m.group(2)
              if not sources:
                  raise ValueError("SOURCES konnte nicht geparst werden: keine URL-Einträge erkannt")

              return sources

          FEED_URLS_CACHE = "feed_urls_cache.json"

          try:
              FEEDS = _extract_feeds_from_combined()
              print(f"✅ {len(FEEDS)} Feeds aus update_combined_blacklist.yml geladen")
              # Cache speichern für Fallback bei zukünftigen Parse-Fehlern.
              # FIX: atomar schreiben – sonst Risiko einer halb-geschriebenen
              # JSON-Datei bei Runner-Kill/OOM, die dann den Fallback-Zweig
              # (unten) zum Absturz bringt.
              write_json_atomic(FEED_URLS_CACHE, {"updated": now_str, "feeds": FEEDS})
          except Exception as _ex:
              # Fallback: gespeicherten Cache laden
              if os.path.exists(FEED_URLS_CACHE):
                  try:
                      with open(FEED_URLS_CACHE) as _cf:
                          _cached = json.load(_cf)
                      FEEDS = _cached.get("feeds", {})
                      _cache_age = _cached.get("updated", "unbekannt")
                      print(f"::warning file=feed_health_monitor.yml::SOURCES-Parsing fehlgeschlagen: {_ex} – nutze Cache ({_cache_age}, {len(FEEDS)} Feeds)")
                      print(f"WARNUNG: Fallback auf feed_urls_cache.json ({_cache_age})")
                  except Exception:
                      _err_msg = f"Feed-Extraktion UND Cache-Fallback fehlgeschlagen: {_ex}"
                      print(f"::error file=feed_health_monitor.yml::{_err_msg}")
                      # FIX: Report immer VOR SystemExit schreiben, damit Commit-Step (if: always())
                      # einen aktuellen Fehler-Report committet statt den veralteten Stand zu behalten.
                      write_text_atomic("feed_health_report.md", f"# Feed Health Monitor – Report\n**Aktualisiert:** {now_str}\n\n---\n\n## ❌ Kritischer Fehler\n\n*{_err_msg}*\n\n---\n*Generiert: {now_str}*\n")
                      raise SystemExit(1)
              else:
                  _err_msg = f"Feed-Extraktion fehlgeschlagen (kein Cache vorhanden): {_ex}"
                  print(f"::error file=feed_health_monitor.yml::{_err_msg}")
                  # FIX: Report immer VOR SystemExit schreiben
                  write_text_atomic("feed_health_report.md", f"# Feed Health Monitor – Report\n**Aktualisiert:** {now_str}\n\n---\n\n## ❌ Kritischer Fehler\n\n*{_err_msg}*\n\n---\n*Generiert: {now_str}*\n")
                  raise SystemExit(1)

          IP_RE = IPV4_RE   # Alias auf strikte Variante aus netshield_common
                            # (frühere lokale \b-Definition entfernt)

          def check_feed(name, url):
              t0 = time.time()
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "NETSHIELD-HealthMonitor/1.0"})
                  with urllib.request.urlopen(req, timeout=20) as r:
                      code   = r.status
                      sample = r.read(2 * 1024 * 1024).decode("utf-8", errors="ignore")  # 2 MB reichen für IP-Sample-Check; 25 MB war unnötiger Netzwerk-/Speicherdruck bei 15 parallelen Requests
                  elapsed = round(time.time() - t0, 2)
                  ip_count = len(set(IP_RE.findall(sample)))
                  has_ips  = ip_count > 0
                  return {"name": name, "url": url, "status": code, "ok": code == 200,
                          "has_ips": has_ips, "sample_ips": ip_count, "ms": int(elapsed*1000)}
              except urllib.error.HTTPError as e:
                  return {"name": name, "url": url, "status": e.code, "ok": False,
                          "has_ips": False, "sample_ips": 0, "ms": int((time.time()-t0)*1000)}
              except Exception as e:
                  return {"name": name, "url": url, "status": 0, "ok": False,
                          "has_ips": False, "sample_ips": 0, "ms": int((time.time()-t0)*1000), "err": str(e)[:80]}

          results = []
          with ThreadPoolExecutor(max_workers=15) as ex:
              futures = {ex.submit(check_feed, n, u): n for n, u in FEEDS.items()}
              # FIX BUG#6: as_completed wirft TimeoutError wenn das 300s-Limit
              # erreicht wird. Alle anderen Workflows fangen das ab – dieser nicht.
              # Ohne try/except crasht der gesamte Workflow statt einen Teilergebnis-
              # Report zu schreiben.
              try:
                  for f in as_completed(futures, timeout=300):
                      r = f.result()
                      results.append(r)
                      icon = "✅" if r["ok"] and r["has_ips"] else ("⚠️" if r["ok"] else "❌")
                      print(f"{icon} {r['name']}: HTTP {r['status']} | {r['ms']}ms | ~{r['sample_ips']} IPs (sample)")
              except TimeoutError:
                  timed_out = [name for fut, name in futures.items() if fut not in {f for f in futures if f.done()}]
                  print(f"::warning::as_completed Timeout (300s) – {len(timed_out)} Feeds nicht abgeschlossen: {timed_out}")

          results.sort(key=lambda x: (not x["ok"], x["name"]))

          ok_count   = sum(1 for r in results if r["ok"] and r["has_ips"])
          warn_count = sum(1 for r in results if r["ok"] and not r["has_ips"])
          err_count  = sum(1 for r in results if not r["ok"])

          print(f"\nErgebnis: ✅ {ok_count} OK | ⚠️ {warn_count} leer | ❌ {err_count} Fehler")

          # ── DataPlane-Deep-Check ───────────────────────────────────────────
          # Separate Prüfung der DataPlane-Feeds: diese 9 HQ-Feeds werden in
          # update_combined_blacklist.yml als Phase 1 vorrangig geladen. Fällt
          # hier einer aus, geht kritisches Honeypot-Signal verloren → als
          # ::error:: (nicht nur ::warning::) melden, damit es nicht im
          # Rauschen der restlichen 100+ Feeds untergeht.
          DATAPLANE_FEEDS = sorted(n for n in FEEDS if n.startswith("dataplane_"))
          dp_results = [r for r in results if r["name"] in set(DATAPLANE_FEEDS)]
          dp_missing = [n for n in DATAPLANE_FEEDS if n not in {r["name"] for r in dp_results}]
          dp_broken  = [r for r in dp_results if not r["ok"]]
          dp_empty   = [r for r in dp_results if r["ok"] and not r["has_ips"]]
          dp_ok      = [r for r in dp_results if r["ok"] and r["has_ips"]]

          print(f"\n── DataPlane-Deep-Check ──")
          print(f"  Gefunden: {len(dp_results)}/{len(DATAPLANE_FEEDS)} | ✅ {len(dp_ok)} | ⚠️ leer: {len(dp_empty)} | ❌ Fehler: {len(dp_broken)}")
          for r in sorted(dp_results, key=lambda x: x["name"]):
              icon = "✅" if r["ok"] and r["has_ips"] else ("⚠️" if r["ok"] else "❌")
              print(f"  {icon} {r['name']}: HTTP {r['status']} | ~{r['sample_ips']} IPs | {r['ms']}ms")

          # Escalation: DataPlane-Ausfall ist kritischer als andere Feed-Ausfälle
          for r in dp_broken:
              err_msg = r.get("err", f"HTTP {r['status']}")
              print(f"::error file=feed_health_monitor.yml::DataPlane-Feed defekt [{r['name']}]: {err_msg}")
          for r in dp_empty:
              print(f"::error file=feed_health_monitor.yml::DataPlane-Feed liefert 0 IPs [{r['name']}]: HTTP {r['status']} – Format-Änderung prüfen")
          for n in dp_missing:
              print(f"::error file=feed_health_monitor.yml::DataPlane-Feed fehlt in FEEDS-Dict [{n}] – Health-Check konnte nicht laufen")

          dp_healthy = (len(dp_broken) == 0 and len(dp_empty) == 0 and len(dp_missing) == 0)

          # ── Report schreiben ───────────────────────────────────────────────
          lines = []
          lines.append("# Feed Health Monitor – Report")
          lines.append(f"**Aktualisiert:** {now_str}\n")
          lines.append(f"**Feeds gesamt:** {len(FEEDS)} | ✅ {ok_count} OK | ⚠️ {warn_count} leer | ❌ {err_count} Fehler\n")
          lines.append("---")

          # ── DataPlane-Sektion zuerst (kritisch, Phase-1-Feeds) ────────────
          dp_icon = "✅" if dp_healthy else "❌"
          lines.append(f"## {dp_icon} DataPlane-Feeds (Phase 1)\n")
          if dp_healthy:
              lines.append(f"Alle {len(DATAPLANE_FEEDS)} DataPlane-Feeds erreichbar und liefern IPs.\n")
          else:
              lines.append("**⚠️ Kritisch:** DataPlane-Feeds werden in `update_combined_blacklist.yml` "
                           "als Phase 1 vorrangig geladen. Ein Ausfall hier bedeutet Verlust von "
                           "Honeypot-Signal (SSH/VNC/Telnet/DNS/SMTP-Angriffe).\n")
          lines.append("| Feed | Status | HTTP | IPs (Sample) | Reaktionszeit |")
          lines.append("|---|---|---|---|---|")
          for r in sorted(dp_results, key=lambda x: x["name"]):
              icon = "✅" if r["ok"] and r["has_ips"] else ("⚠️" if r["ok"] else "❌")
              lines.append(f"| `{r['name']}` | {icon} | {r['status']} | ~{r['sample_ips']} | {r['ms']}ms |")
          for n in dp_missing:
              lines.append(f"| `{n}` | ❌ | – | – | *fehlt im FEEDS-Dict* |")
          lines.append("")

          if err_count > 0:
              lines.append("## ❌ Fehlerhafte Feeds\n")
              lines.append("| Feed | HTTP | Fehler | Reaktionszeit |")
              lines.append("|---|---|---|---|")
              for r in results:
                  if not r["ok"]:
                      err_msg = r.get("err", f"HTTP {r['status']}")
                      lines.append(f"| `{r['name']}` | {r['status']} | {err_msg} | {r['ms']}ms |")
              lines.append("")

          if warn_count > 0:
              lines.append("## ⚠️ Feeds ohne IPs (möglicherweise leer oder falsches Format)\n")
              lines.append("| Feed | HTTP | Reaktionszeit |")
              lines.append("|---|---|---|")
              for r in results:
                  if r["ok"] and not r["has_ips"]:
                      lines.append(f"| `{r['name']}` | {r['status']} | {r['ms']}ms |")
              lines.append("")

          lines.append("## ✅ Alle Feeds – Übersicht\n")
          lines.append("| Feed | Status | HTTP | IPs (Sample) | Reaktionszeit |")
          lines.append("|---|---|---|---|---|")
          for r in results:
              icon = "✅" if r["ok"] and r["has_ips"] else ("⚠️" if r["ok"] else "❌")
              lines.append(f"| `{r['name']}` | {icon} | {r['status']} | ~{r['sample_ips']} | {r['ms']}ms |")

          lines.append(f"\n---\n*Generiert: {now_str} | {len(FEEDS)} Feeds geprüft*")

          write_text_atomic("feed_health_report.md", "\n".join(lines))
          print("feed_health_report.md geschrieben")

          # FIX #9: failed_feeds und warned_feeds im JSON – damit netshield_report_generator
          # kritische Feed-Ausfälle namentlich im Dashboard anzeigen kann.
          failed_feeds = [r["name"] for r in results if not r["ok"]]
          warned_feeds = [r["name"] for r in results if r["ok"] and not r["has_ips"]]
          # FIX: atomar schreiben – netshield_report_generator und workflow_health_checker
          # lesen diese Datei. Bei Runner-Kill waehrend dem Schreiben koennten sie
          # eine halb-geschriebene JSON-Datei sehen.
          write_json_atomic("feed_health_status.json", {
                  "updated": now_str,
                  "summary": {"ok": ok_count, "warn": warn_count, "error": err_count},
                  "failed_feeds": failed_feeds,
                  "warned_feeds": warned_feeds,
                  "dataplane_status": {
                      "healthy": dp_healthy,
                      "expected": len(DATAPLANE_FEEDS),
                      "ok":      len(dp_ok),
                      "empty":   [r["name"] for r in dp_empty],
                      "broken":  [r["name"] for r in dp_broken],
                      "missing": dp_missing,
                  },
                  "feeds": results,
              }, indent=2)
          EOF

      - name: Commit
        if: always()  # FIX: auch bei raise SystemExit(1) in _extract_feeds_from_combined() den Report committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed_health_report.md 2>/dev/null || true
          git add feed_health_status.json 2>/dev/null || true
          git add feed_urls_cache.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "Feed Health Monitor: $(date -u '+%Y-%m-%d %H:%M') UTC"
            for attempt in 1 2 3 4 5; do
              echo "Push-Versuch $attempt..."
              git fetch origin ${GITHUB_REF_NAME}
              git stash --include-untracked 2>/dev/null || true
              if git rebase -X theirs origin/${GITHUB_REF_NAME}; then
                git stash pop 2>/dev/null || true
                if git push origin HEAD:${GITHUB_REF_NAME}; then
                  echo "Push erfolgreich (Versuch $attempt)"
                  exit 0
                fi
              else
                git stash pop 2>/dev/null || true
                git checkout --theirs feed_health_report.md \
                  feed_health_status.json feed_urls_cache.json 2>/dev/null || true
                git add feed_health_report.md \
                  feed_health_status.json feed_urls_cache.json 2>/dev/null || true
                GIT_EDITOR=true git rebase --continue 2>/dev/null || git rebase --skip
              fi
              sleep $((attempt * 3))
            done
            echo "FEHLER: Push nach 5 Versuchen fehlgeschlagen"
            exit 1
          fi
