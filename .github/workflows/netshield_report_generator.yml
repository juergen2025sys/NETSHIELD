name: NETSHIELD Report Generator

on:
  schedule:
    - cron: '30 * * * *'   # stündlich (30 Min nach der vollen Stunde – combined braucht ~20min, Puffer 10min)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Generate NETSHIELD_REPORT.md
        run: |
          python3 << 'EOF'
          import sys as _sys; _sys.path.insert(0, "scripts")
          from netshield_common import (
              load_whitelist, load_fp_set, is_in_fp_set,
              is_valid_public_ipv4, is_valid_public_cidr,
              is_protected_entry, is_whitelisted,
              parse_entries as _parse_entries, calculate_confidence,
              safe_get_date, parse_date, sort_ips, write_ip_list,
              write_text_atomic,
              fetch_url, check_local_feed_age,
              IPV4_RE, CIDR_RE, TIMESTAMP_RE,
          )

          # Init: Whitelist + FP-Set laden
          load_whitelist()
          load_fp_set()

          import sys
          import json
          import os
          import re
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")

          def count_ips(filepath):
              if not os.path.exists(filepath):
                  return 0
              count = 0
              with open(filepath, encoding="utf-8") as f:
                  for line in f:
                      if line.strip() and not line.startswith("#"):
                          count += 1
              return count

          def derive_feed_count(workflow_path=".github/workflows/update_combined_blacklist.yml"):
              if not os.path.exists(workflow_path):
                  return "–"
              try:
                  with open(workflow_path, encoding="utf-8") as f:
                      workflow = f.read()

                  sources_block = re.search(r'^\s+SOURCES\s*=\s*\{', workflow, re.MULTILINE)
                  if not sources_block:
                      return "–"

                  brace_start = sources_block.start() + sources_block.group().index('{')
                  depth = 0
                  brace_end = brace_start
                  for i, ch in enumerate(workflow[brace_start:], brace_start):
                      if ch == '{':
                          depth += 1
                      elif ch == '}':
                          depth -= 1
                          if depth == 0:
                              brace_end = i + 1
                              break
                  raw_sources = workflow[brace_start:brace_end]
                  remote_feeds = len(re.findall(r'^[ \t]*"([^"\n]+)"\s*:\s*\(\s*"([^"\n]+)"\s*,\s*(True|False)\s*\)\s*,?', raw_sources, re.MULTILINE))

                  # FIX BUG1: LOCAL_FEEDS ist ein Dict ({...}), keine List ([...]).
                  # Suche nach { statt [ und parse Dict-Einträge "name": True/False.
                  local_block = re.search(r'^\s+LOCAL_FEEDS\s*=\s*\{', workflow, re.MULTILINE)
                  local_feeds = 0
                  if local_block:
                      brace_start2 = local_block.start() + local_block.group().index('{')
                      depth = 0
                      brace_end2 = brace_start2
                      for i, ch in enumerate(workflow[brace_start2:], brace_start2):
                          if ch == '{':
                              depth += 1
                          elif ch == '}':
                              depth -= 1
                              if depth == 0:
                                  brace_end2 = i + 1
                                  break
                      raw_local = workflow[brace_start2:brace_end2]
                      local_feeds = len(re.findall(r'^[ \t]*"([^"\n]+)"\s*:\s*(True|False)\s*,?', raw_local, re.MULTILINE))

                  total = remote_feeds + local_feeds

                  # Auto-discovered Feeds mitzählen
                  auto_file = "auto_discovered_feeds.json"
                  if os.path.exists(auto_file):
                      try:
                          with open(auto_file, encoding="utf-8") as af:
                              auto_data = json.load(af)
                          total += auto_data.get("total_feeds", 0)
                      except Exception as _suppressed:
                          print(f"WARN: suppressed Exception: {_suppressed}", file=sys.stderr)

                  return str(total) if total > 0 else "–"
              except Exception:
                  return "–"

          _TS_RE = re.compile(r'#\s*Aktualisiert:\s*(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2})\s*UTC')

          def file_age(filepath):
              """Liest den '# Aktualisiert: YYYY-MM-DD HH:MM UTC' Header aus der Datei.
              Fallback auf os.path.getmtime() wäre falsch – git checkout setzt mtime
              immer auf den Checkout-Zeitpunkt, nicht auf das letzte echte Update."""
              if not os.path.exists(filepath):
                  return "–"
              try:
                  with open(filepath, encoding="utf-8") as _f:
                      # Nur die ersten 10 Zeilen lesen – Header steht immer am Anfang
                      for _ in range(10):
                          line = _f.readline()
                          if not line:
                              break
                          m = _TS_RE.search(line)
                          if m:
                              return m.group(1) + " UTC"
              except Exception as _suppressed:
                  print(f"WARN: suppressed Exception: {_suppressed}", file=sys.stderr)
              return "–"

          FILES = {
              "combined_threat_blacklist_ipv4.txt": "Stufe 1 – Alle IPs (180 Tage)",
              "active_blacklist_ipv4.txt": "Stufe 2 – Aktiv (30 Tage + Conf≥65)",
              "blacklist_confidence40_ipv4.txt": "Mittleres/Hohes Vertrauen (≥40/100) → OPNsense",
              "watchlist_confidence25to39_ipv4.txt": "Watchlist (Score 25-39/100)",
              "cve_exploit_ips.txt": "CVE Exploit IPs",
              "bot_detector_blacklist_ipv4.txt": "Bot-Detector Blacklist",
              "honeypot_ips.txt": "Honeypot IPs",
              "honeydb_ips.txt": "HoneyDB Community Honeypot (API)",
          }

          lines = []
          lines.append("# 🛡 NETSHIELD Report")
          lines.append(f"**Aktualisiert:** {now_str}\n")
          lines.append("---")
          lines.append("## 📊 Listen-Übersicht\n")
          lines.append("| Datei | Beschreibung | IPs | Letzte Änderung |")
          lines.append("|---|---|---:|---|")

          total = 0
          for fname, desc in FILES.items():
              count = count_ips(fname)
              age = file_age(fname)
              exists = "✅" if os.path.exists(fname) else "❌"
              lines.append(f"| {exists} `{fname}` | {desc} | **{count:,}** | {age} |")
              if fname == "combined_threat_blacklist_ipv4.txt":
                  total = count

          lines.append("")
          lines.append("---")
          lines.append("## 🔗 OPNsense Alias URL\n")
          lines.append("```")
          lines.append("https://raw.githubusercontent.com/juergen2025sys/NETSHIELD/main/blacklist_confidence40_ipv4.txt")
          lines.append("```")
          lines.append("")

          if os.path.exists("feed_health_status.json"):
              try:
                  with open("feed_health_status.json", encoding="utf-8") as f:
                      fh = json.load(f)
                  s = fh.get("summary", {})
                  lines.append("---")
                  lines.append(f"## 🔍 Feed Health: ✅ {s.get('ok', 0)} OK | ⚠️ {s.get('warn', 0)} leer | ❌ {s.get('error', 0)} Fehler\n")
                  failed = fh.get("failed_feeds", [])
                  warned = fh.get("warned_feeds", [])
                  if failed:
                      lines.append(f"**❌ Ausgefallen:** {', '.join(f'`{n}`' for n in failed[:10])}{'…' if len(failed) > 10 else ''}\n")
                  if warned:
                      lines.append(f"**⚠️ Leer:** {', '.join(f'`{n}`' for n in warned[:10])}{'…' if len(warned) > 10 else ''}\n")
                  lines.append(f"*Letzter Check: {fh.get('updated', '–')} – Details: [feed_health_report.md](feed_health_report.md)*\n")
              except Exception as e:
                  print(f"WARNUNG: feed_health_status.json konnte nicht gelesen werden: {e}")

          if os.path.exists("workflow_health_report.md"):
              lines.append("---")
              lines.append("## ⚙️ Workflow Health\n")
              lines.append("*Details: [workflow_health_report.md](workflow_health_report.md)*\n")

          lines.append("---")
          lines.append(f"*Automatisch generiert von NETSHIELD Report Generator · {now_str}*")

          # ── FIX: Nur schreiben wenn sich Daten geändert haben ──────────
          # Verhindert ~24 unnötige Commits/Tag durch stündlich wechselnde
          # Timestamps bei unveränderten IP-Zahlen und Feed-Health-Daten.
          new_content = "\n".join(lines)
          _ts_strip = re.compile(r'\*\*Aktualisiert:\*\*[^\n]*|\*Automatisch generiert[^\n]*|\*Letzter Check:[^\n]*')
          def _data_only(text):
              return _ts_strip.sub("", text).strip()

          write_report = True
          # FIX: Wenn combined_threat_blacklist_ipv4.txt fehlt oder leer ist,
          # Report nicht mit 0-Werten überschreiben (fehlgeschlagener Combined-Run).
          if total == 0 and os.path.exists("NETSHIELD_REPORT.md"):
              print("WARNUNG: combined=0 IPs – behalte bestehenden NETSHIELD_REPORT.md")
              write_report = False
          elif os.path.exists("NETSHIELD_REPORT.md"):
              with open("NETSHIELD_REPORT.md", encoding="utf-8") as _old:
                  if _data_only(_old.read()) == _data_only(new_content):
                      write_report = False
                      print(f"NETSHIELD_REPORT.md: Daten unverändert – Schreiben übersprungen")

          if write_report:
              write_text_atomic("NETSHIELD_REPORT.md", new_content)
              print(f"NETSHIELD_REPORT.md geschrieben | combined: {total:,} IPs")
          EOF

      - name: Update README Header Stats
        run: |
          python3 << 'EOF'
          import sys as _sys; _sys.path.insert(0, "scripts")
          from netshield_common import (
              load_whitelist, load_fp_set, is_in_fp_set,
              is_valid_public_ipv4, is_valid_public_cidr,
              is_protected_entry, is_whitelisted,
              parse_entries as _parse_entries, calculate_confidence,
              safe_get_date, parse_date, sort_ips, write_ip_list,
              write_text_atomic,
              fetch_url, check_local_feed_age,
              IPV4_RE, CIDR_RE, TIMESTAMP_RE,
          )
          import json
          import os
          import re
          import sys
          from datetime import datetime, timezone

          # ── Konstanten ────────────────────────────────────────────────────
          WORKFLOW_COUNT  = len([
              f for f in os.listdir(".github/workflows")
              if f.endswith(".yml")
          ]) if os.path.isdir(".github/workflows") else 16

          def count_ips(filepath):
              if not os.path.exists(filepath):
                  return 0
              count = 0
              with open(filepath, encoding="utf-8") as f:
                  for line in f:
                      if line.strip() and not line.startswith("#"):
                          count += 1
              return count

          # derive_feed_count() ist identisch mit der gleichnamigen Funktion im
          # vorherigen Step – beide Steps sind eigenständige Python-Prozesse
          # (separate EOF-Heredocs) und teilen keinen Namespace.
          # FIX DUP1: Funktion als eigenständige Definition direkt hier, statt
          # als unsynchronisierte Kopie. Beide EOF-Blöcke definieren die Funktion
          # lokal – das ist unvermeidbar wegen des Heredoc-Namespaces.
          # STAND: Beide Blöcke verwenden identischen Namen derive_feed_count()
          # (kein abweichendes _-Präfix mehr) und identische Implementierung.
          # Änderungen immer in BEIDEN EOF-Blöcken vornehmen (Kommentar markiert Stelle).
          if not os.path.exists("README.md"):
              print("README.md nicht gefunden – übersprungen")
              raise SystemExit(0)

          active     = count_ips("active_blacklist_ipv4.txt")
          cve        = count_ips("cve_exploit_ips.txt")
          honeypot   = count_ips("honeypot_ips.txt")
          # FIX: Guard gegen 0-Werte bei fehlendem/leerem Combined-Run.
          # Wenn alle Hauptlisten 0 IPs haben, liegt wahrscheinlich ein
          # fehlgeschlagener Combined-Run vor → README nicht mit 0-Werten überschreiben.
          if active == 0 and cve == 0 and honeypot == 0:
              print("WARNUNG: Alle Hauptlisten leer oder fehlend – README-Update übersprungen")
              raise SystemExit(0)
          # FIX DUP1: Identische Logik wie derive_feed_count() im ersten EOF-Block.
          # Separate EOF-Heredocs teilen keinen Namespace – lokale Definition nötig.
          # !! Bei Änderungen auch derive_feed_count() im ersten EOF-Block anpassen !!
          def derive_feed_count(workflow_path=".github/workflows/update_combined_blacklist.yml"):
              if not os.path.exists(workflow_path):
                  return "–"
              try:
                  with open(workflow_path, encoding="utf-8") as _wf:
                      _wf_text = _wf.read()
                  _sb = re.search(r'^\s+SOURCES\s*=\s*\{', _wf_text, re.MULTILINE)
                  if not _sb:
                      return "–"
                  _bs = _sb.start() + _sb.group().index('{')
                  _depth, _be = 0, _bs
                  for _i, _ch in enumerate(_wf_text[_bs:], _bs):
                      if _ch == '{': _depth += 1
                      elif _ch == '}':
                          _depth -= 1
                          if _depth == 0: _be = _i + 1; break
                  _remote = len(re.findall(r'^[ \t]*"([^"\n]+)"\s*:\s*\(\s*"([^"\n]+)"\s*,\s*(True|False)\s*\)\s*,?', _wf_text[_bs:_be], re.MULTILINE))
                  _lb = re.search(r'^\s+LOCAL_FEEDS\s*=\s*\{', _wf_text, re.MULTILINE)
                  _local = 0
                  if _lb:
                      _bs2 = _lb.start() + _lb.group().index('{')
                      _depth, _be2 = 0, _bs2
                      for _i, _ch in enumerate(_wf_text[_bs2:], _bs2):
                          if _ch == '{': _depth += 1
                          elif _ch == '}':
                              _depth -= 1
                              if _depth == 0: _be2 = _i + 1; break
                      _local = len(re.findall(r'^[ \t]*"([^"\n]+)"\s*:\s*(True|False)\s*,?', _wf_text[_bs2:_be2], re.MULTILINE))
                  _total = _remote + _local
                  _auto = "auto_discovered_feeds.json"
                  if os.path.exists(_auto):
                      try:
                          with open(_auto, encoding="utf-8") as _af:
                              _total += json.load(_af).get("total_feeds", 0)
                      except Exception as _suppressed:
                          print(f"WARN: suppressed Exception: {_suppressed}", file=sys.stderr)
                  return str(_total) if _total > 0 else "–"
              except Exception:
                  return "–"
          feed_count = derive_feed_count()
          now_str    = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          # ── Neue Tabelleninhalte (passend zum neuen README-Format) ────────
          # STATS_TABLE: Key Statistics
          stats_header = "| IP-Quellen | Aktive IP-Drohungen (Confidence \u226565) | CVE/Exploit IPs | Honeypot IPs |"
          stats_sep    = "|:---|:---|:---|:---|"
          stats_data   = f"| {feed_count} (dynamisch) | **{active:,}** | **{cve:,}** | **{honeypot:,}** |"

          # META_TABLE: Aktualisierungs-Status
          meta_header = "| Letztes Update | Update-Intervall | IP-Retention | Aktive Workflows | Geografische Abdeckung |"
          meta_sep    = "|:---|:---|:---|:---|:---|"
          meta_data   = f"| {now_str} | 8\u00d7 t\u00e4glich | 180 Tage | {WORKFLOW_COUNT} | 250+ L\u00e4nder |"

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          def replace_between_markers(text, start_marker, end_marker,
                                      header, sep, data, label):
              """Ersetzt Tabelleninhalt zwischen HTML-Kommentar-Markern."""
              pattern = (
                  rf'({re.escape(start_marker)}\n'
                  rf'\*\*[^\n]+\*\*\n\n)'           # **Titel**
                  rf'\|[^\n]+\|\n'                  # alter Header
                  rf'\|[^\n]+\|\n'                  # alter Separator
                  rf'\|[^\n]+\|\n'                  # alte Datenzeile
                  rf'({re.escape(end_marker)})'
              )
              replacement = (
                  rf'\g<1>'
                  + header + '\n'
                  + sep    + '\n'
                  + data   + '\n'
                  + r'\g<2>'
              )
              new_text, n = re.subn(pattern, replacement, text, count=1)
              if n:
                  print(f"✅ {label} aktualisiert")
              else:
                  print(f"WARNUNG: {label} – Marker nicht gefunden oder kein Match")
              return new_text

          # FIX: Nur schreiben wenn sich IP-Zahlen oder Feed-Counts geändert haben.
          # Timestamp in meta_data ändert sich jede Stunde → nur aktualisieren
          # wenn auch die Daten-Spalten unterschiedlich sind.
          _old_content = content  # content vor replace_between_markers
          content = replace_between_markers(
              content,
              "<!-- STATS_TABLE_START -->", "<!-- STATS_TABLE_END -->",
              stats_header, stats_sep, stats_data,
              "STATS_TABLE"
          )
          content = replace_between_markers(
              content,
              "<!-- META_TABLE_START -->", "<!-- META_TABLE_END -->",
              meta_header, meta_sep, meta_data,
              "META_TABLE"
          )

          # Vergleich ohne Timestamps: nur schreiben wenn Daten-Zeilen sich unterscheiden
          _ts_re_readme = re.compile(r'\| \d{4}-\d{2}-\d{2} \d{2}:\d{2} UTC \|')
          _old_stripped = _ts_re_readme.sub("| TS |", _old_content)
          _new_stripped = _ts_re_readme.sub("| TS |", content)

          if _old_stripped != _new_stripped:
              write_text_atomic("README.md", content)
              print(f"   Active={active:,} | CVE={cve:,} | Honeypot={honeypot:,} | Update={now_str}")
          else:
              print("README Header Stats: Daten unverändert – Schreiben übersprungen")
          EOF

      - name: Update README IP Counts
        run: |
          python3 << 'EOF'
          import sys as _sys; _sys.path.insert(0, "scripts")
          from netshield_common import (
              load_whitelist, load_fp_set, is_in_fp_set,
              is_valid_public_ipv4, is_valid_public_cidr,
              is_protected_entry, is_whitelisted,
              parse_entries as _parse_entries, calculate_confidence,
              safe_get_date, parse_date, sort_ips, write_ip_list,
              write_text_atomic,
              fetch_url, check_local_feed_age,
              IPV4_RE, CIDR_RE, TIMESTAMP_RE,
          )
          import os
          import re

          def count_ips(filepath):
              if not os.path.exists(filepath):
                  return None
              count = 0
              with open(filepath, encoding="utf-8") as f:
                  for line in f:
                      if line.strip() and not line.startswith("#"):
                          count += 1
              return count

          README_COUNTS = {
              "combined_threat_blacklist_ipv4.txt": lambda n: f"**{n:,}**",
              "active_blacklist_ipv4.txt": lambda n: f"**{n:,}**",
              "blacklist_confidence40_ipv4.txt": lambda n: f"**{n:,}**",
              "watchlist_confidence25to39_ipv4.txt": lambda n: f"**{n:,}**",
              "cve_exploit_ips.txt": lambda n: f"**{n:,}**",
              "bot_detector_blacklist_ipv4.txt": lambda n: f"**{n:,}**",
              "abuseipdb_api_blacklist.txt": lambda n: f"**{n:,}**",
              "honeypot_ips.txt": lambda n: f"**{n:,}**",
              "honeydb_ips.txt": lambda n: f"**{n:,}**",
              "asn_blocklist_firewall.txt": lambda n: f"**{n:,}**",
          }

          if not os.path.exists("README.md"):
              print("README.md nicht gefunden – übersprungen")
              raise SystemExit(0)

          # FIX BUG#9: Guard gegen 0-Überschreibung bei leerem/fehlendem Combined-Run.
          # Der vorige Step ("Update README Header Stats") hat denselben Guard –
          # dieser Step hatte ihn nicht. Bei Pipeline-Ausfall würden die IP-Zahlen
          # im README stillschweigend auf 0 gesetzt (combined existiert, ist aber leer).
          # Prüfung: combined_threat_blacklist als Hauptindikator. Falls leer/fehlend
          # → kein Update, damit die README-Zahlen des letzten erfolgreichen Runs
          # sichtbar bleiben.
          combined_count = count_ips("combined_threat_blacklist_ipv4.txt")
          if combined_count is not None and combined_count == 0:
              print("WARNUNG: combined_threat_blacklist_ipv4.txt ist leer – "
                    "README IP Counts nicht überschrieben (Pipeline-Ausfall?)")
              raise SystemExit(0)

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          changes = 0
          for filename, fmt in README_COUNTS.items():
              count = count_ips(filename)
              if count is None:
                  print(f"  SKIP: {filename} nicht vorhanden")
                  continue

              formatted = fmt(count)
              pattern_link = (
                  r'(\|\s*\[`?' + re.escape(filename) + r'`?\]\([^)]*\)\s*\|[^|]*\|)\s*[^|]+?(\s*\|)'
              )
              pattern_code = (
                  r'(\|[^|]*`' + re.escape(filename) + r'`[^|]*\|[^|]*\|)\s*[^|]+?(\s*\|)'
              )

              matched = False
              new_readme, n1 = re.subn(pattern_link, rf'\1 {formatted} \2', readme)
              if n1 > 0:
                  readme = new_readme
                  matched = True
                  print(f"  ✅ {filename}: {formatted} (Link-Pattern, {n1} Treffer)")

              if not matched:
                  new_readme, n2 = re.subn(pattern_code, rf'\1 {formatted} \2', readme)
                  if n2 > 0:
                      readme = new_readme
                      matched = True
                      print(f"  ✅ {filename}: {formatted} (Code-Pattern, {n2} Treffer)")

              if matched:
                  changes += 1
                  continue

              lines_out = []
              replaced = False
              for line in readme.splitlines(keepends=True):
                  if f"`{filename}`" in line or f"({filename})" in line:
                      cols = line.split("|")
                      if len(cols) >= 5:
                          for idx in range(1, len(cols) - 1):
                              cleaned = cols[idx].strip().replace("*", "").replace(",", "").replace(" ", "")
                              if cleaned.isdigit():
                                  cols[idx] = f" {formatted} "
                                  line = "|".join(cols)
                                  replaced = True
                                  break
                  lines_out.append(line)

              if replaced:
                  readme = "".join(lines_out)
                  changes += 1
                  print(f"  ✅ {filename}: {formatted} (Spalten-Fallback)")
              else:
                  print(f"  ⚠️  {filename}: kein Match in README-Tabelle")

          if changes > 0:
              write_text_atomic("README.md", readme)
              print(f"\n{changes} IP-Zahlen im README aktualisiert")
          else:
              print("Keine Änderungen am README")
          EOF

      - name: Commit
        if: always()  # FIX: auch bei unbehandelter Exception in Python-Steps den Report committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add NETSHIELD_REPORT.md README.md
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "NETSHIELD Report Generator: $(date -u '+%Y-%m-%d %H:%M') UTC"
            for attempt in 1 2 3 4 5; do
              echo "Push-Versuch $attempt..."
              git fetch origin ${GITHUB_REF_NAME}
              git stash --include-untracked 2>/dev/null || true
              if git rebase -X theirs origin/${GITHUB_REF_NAME}; then
                git stash pop 2>/dev/null || true
                if git push origin HEAD:${GITHUB_REF_NAME}; then
                  echo "Push erfolgreich (Versuch $attempt)"
                  exit 0
                fi
              else
                git stash pop 2>/dev/null || true
                git checkout --theirs NETSHIELD_REPORT.md README.md 2>/dev/null || true
                git add NETSHIELD_REPORT.md README.md 2>/dev/null || true
                GIT_EDITOR=true git rebase --continue 2>/dev/null || git rebase --skip
              fi
              sleep $((attempt * 3))
            done
            echo "FEHLER: Push nach 5 Versuchen fehlgeschlagen"
            exit 1
          fi
