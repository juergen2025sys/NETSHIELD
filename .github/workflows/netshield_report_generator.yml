name: NETSHIELD Report Generator (Optimized)

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update README (Stats + Timestamp)
        run: |
          python3 << 'EOF'
          import os, re
          from datetime import datetime, timezone

          def count_ips(f):
              if not os.path.exists(f): return 0
              return sum(1 for l in open(f) if l.strip() and not l.startswith("#"))

          combined  = count_ips("combined_threat_blacklist_ipv4.txt")
          active    = count_ips("active_blacklist_ipv4.txt")
          conf40    = count_ips("blacklist_confidence40_ipv4.txt")
          watchlist = count_ips("watchlist_confidence25to39_ipv4.txt")
          cve       = count_ips("cve_exploit_ips.txt")
          honeypot  = count_ips("honeypot_ips.txt")

          now_str = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          stats = f"| 📦 Combined | 🔴 Active ≥65 | 🟡 Confidence ≥40 | 🟠 Watchlist | 🚨 CVE/Exploit | 🍯 Honeypot | 📡 Feeds |\n|:-----------:|:-------------:|:-----------------:|:------------:|:--------------:|:-----------:|:--------:|\n| **{combined:,}** | **{active:,}** | **{conf40:,}** | **{watchlist:,}** | **{cve:,}** | **{honeypot:,}** | **98** |"

          meta = f"| 🕐 Letztes Update | 🔄 Intervall | 📅 IP-Retention | ⚙️ Workflows | 🌍 Länder |\n|:-----------------:|:------------:|:---------------:|:------------:|:---------:|\n| {now_str} | 8× täglich | 180 Tage | 16 aktiv | 250+ |"

          with open("README.md","r",encoding="utf-8") as f:
              c = f.read()

          c = re.sub(r"<!-- STATS_TABLE_START -->.*?<!-- STATS_TABLE_END -->",
                     f"<!-- STATS_TABLE_START -->\n{stats}\n<!-- STATS_TABLE_END -->", c, flags=re.S)

          c = re.sub(r"<!-- META_TABLE_START -->.*?<!-- META_TABLE_END -->",
                     f"<!-- META_TABLE_START -->\n{meta}\n<!-- META_TABLE_END -->", c, flags=re.S)

          c = c.replace("<!-- LAST_UPDATE -->", now_str)

          open("README.md","w",encoding="utf-8").write(c)
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "auto update" || echo "no changes"
          git push
