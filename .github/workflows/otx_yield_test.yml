name: OTX Yield Test (manuell)

# Einmaliger Test-Workflow: misst, wie viele neue IPs OTX liefern wuerde,
# BEVOR ein dauerhafter OTX-Workflow integriert wird.
#
# Nicht als Cron eingerichtet -> nur manuell ueber "Run workflow" Button.
# Loescht oder veraendert keine Blacklists, schreibt nur einen Report.

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Pulses der letzten X Tage scannen'
        required: false
        default: '30'
      max_pulses:
        description: 'Maximale Anzahl Pulses (Sicherheits-Limit)'
        required: false
        default: '500'
      max_api_requests:
        description: 'Maximale API-Requests (Rate-Limit-Schutz)'
        required: false
        default: '100'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write   # nur fuer Report-Commit
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  otx-yield-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Run OTX Yield Test
        env:
          OTX_API_KEY:           ${{ secrets.OTX_API_KEY }}
          OTX_DAYS_BACK:         ${{ inputs.days_back }}
          OTX_MAX_PULSES:        ${{ inputs.max_pulses }}
          OTX_MAX_API_REQUESTS:  ${{ inputs.max_api_requests }}
        run: |
          if [ -z "$OTX_API_KEY" ]; then
            echo "::error::Secret OTX_API_KEY fehlt."
            echo "Setup: Settings -> Secrets and variables -> Actions -> New repository secret"
            echo "Name: OTX_API_KEY"
            echo "Wert: dein Key von https://otx.alienvault.com/api"
            exit 1
          fi
          python3 scripts/otx_test_yield.py

      - name: Upload JSON-Report als Artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: otx-yield-test-report
          path: otx_yield_test_report.json
          retention-days: 30

      - name: Job Summary
        if: always()
        run: |
          if [ -f otx_yield_test_report.json ]; then
            echo "## OTX Yield Test Ergebnis" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat otx_yield_test_report.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
