name: Update Google IP Whitelist

on:
  schedule:
    - cron: '0 4 * * *'  # täglich 04:00 UTC
  workflow_dispatch:      # manuell auslösbar

jobs:
  update-whitelist:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch und verifiziere Google IP Ranges
        id: fetch
        run: |
          python3 << 'EOF'
          import json
          import urllib.request
          import ssl
          import sys
          import os

          URL = "https://www.gstatic.com/ipranges/goog.json"

          # SSL-Kontext: nur echte Zertifikate akzeptieren
          ctx = ssl.create_default_context()
          ctx.check_hostname = True
          ctx.verify_mode = ssl.CERT_REQUIRED

          print(f"Fetche {URL} ...")
          try:
              with urllib.request.urlopen(URL, context=ctx, timeout=30) as resp:
                  raw = resp.read()
          except Exception as e:
              print(f"FEHLER beim Fetchen: {e}")
              sys.exit(1)

          # JSON parsen
          try:
              data = json.loads(raw)
          except json.JSONDecodeError as e:
              print(f"FEHLER: Kein valides JSON: {e}")
              sys.exit(1)

          # Struktur prüfen
          if "syncToken" not in data or "prefixes" not in data:
              print("FEHLER: Unerwartete JSON-Struktur - kein syncToken oder prefixes")
              sys.exit(1)

          # Nur IPv4 extrahieren
          ranges = []
          for entry in data["prefixes"]:
              if "ipv4Prefix" in entry:
                  ranges.append(entry["ipv4Prefix"])

          # Mindestanzahl prüfen - echtes goog.json hat aktuell ~96 Einträge
          if len(ranges) < 50:
              print(f"FEHLER: Nur {len(ranges)} Ranges - unter Mindestschwelle (50), Abbruch")
              sys.exit(1)

          print(f"OK: {len(ranges)} Google IPv4 Ranges verifiziert (syncToken: {data['syncToken']})")

          # Speichern für nächste Steps
          import os
          WS = os.environ.get("GITHUB_WORKSPACE", ".")
          with open(os.path.join(WS, "google_ranges_new.json"), "w") as f:
              json.dump(sorted(ranges), f, indent=2)

          EOF

      - name: Whitelist aktualisieren
        id: update
        run: |
          python3 << 'EOF'
          import json
          import os

          WS = os.environ.get("GITHUB_WORKSPACE", ".")
          WHITELIST_PATH = os.path.join(WS, "whitelist.json")
          GOOGLE_RANGES_PATH = os.path.join(WS, "google_ranges.json")
          NEW_RANGES_PATH = os.path.join(WS, "google_ranges_new.json")

          # Neue Google-Ranges laden
          with open(NEW_RANGES_PATH) as f:
              new_google_ranges = set(json.load(f))

          # Alte Google-Ranges laden (leer beim ersten Lauf)
          if os.path.exists(GOOGLE_RANGES_PATH):
              with open(GOOGLE_RANGES_PATH) as f:
                  old_google_ranges = set(json.load(f))
          else:
              old_google_ranges = set()

          # Whitelist laden
          with open(WHITELIST_PATH) as f:
              whitelist = json.load(f)

          entries = whitelist["entries"]
          original_entries = set(entries)

          # Alte Google-Ranges entfernen, neue hinzufügen
          # (nur was vorher von Google kam wird angefasst)
          entries_set = set(entries)
          entries_set -= old_google_ranges   # alte raus
          entries_set |= new_google_ranges   # neue rein

          if entries_set == original_entries:
              print("Keine Änderungen - Whitelist bereits aktuell")
              with open(os.path.join(WS, "changed.txt"), "w") as f:
                  f.write("false")
          else:
              added = new_google_ranges - old_google_ranges
              removed = old_google_ranges - new_google_ranges
              print(f"Änderungen: +{len(added)} hinzugefügt, -{len(removed)} entfernt")
              if added:
                  print(f"  Neu: {sorted(added)[:5]}{'...' if len(added) > 5 else ''}")
              if removed:
                  print(f"  Weg: {sorted(removed)[:5]}{'...' if len(removed) > 5 else ''}")

              # Whitelist neu schreiben (Reihenfolge: manuelle zuerst, Google sortiert dahinter)
              manual = sorted(entries_set - new_google_ranges)
              google = sorted(new_google_ranges)
              new_entries = manual + google

              whitelist["entries"] = new_entries
              whitelist["_description"] = (
                  f"NETSHIELD Whitelist – IPs/CIDRs die NIE auf die Blacklist kommen. "
                  f"{len(new_entries)} Eintraege."
              )

              with open(WHITELIST_PATH, "w") as f:
                  json.dump(whitelist, f, indent=2, ensure_ascii=False)

              # google_ranges.json aktualisieren
              with open(GOOGLE_RANGES_PATH, "w") as f:
                  json.dump(sorted(new_google_ranges), f, indent=2)

              with open(os.path.join(WS, "changed.txt"), "w") as f:
                  f.write("true")

          EOF

      - name: Commit wenn Änderungen
        run: |
          CHANGED=$(cat $GITHUB_WORKSPACE/changed.txt)
          if [ "$CHANGED" = "true" ]; then
            git config user.name "NETSHIELD Bot"
            git config user.email "netshield-bot@noreply"
            git add whitelist.json google_ranges.json
            git commit -m "chore: Google IP Ranges in Whitelist aktualisiert [auto]"
            git push
            echo "Whitelist aktualisiert und gepusht"
          else
            echo "Keine Änderungen - kein Commit nötig"
          fi
