name: AbuseIPDB Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * *"

permissions:
  contents: write

concurrency:
  group: abuseipdb-feed
  cancel-in-progress: false

jobs:
  abuseipdb-feed:
    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: "1"
      MIN_SCORE: "90"
      CONFIDENCE: "75"
      LIMIT: "5000"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore seen_db Cache
        uses: actions/cache@v4
        with:
          path: seen_db.json
          key: netshield-seen-db

      - name: Ensure seen_db exists
        run: |
          if [ ! -f seen_db.json ]; then
            echo "{}" > seen_db.json
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch AbuseIPDB Blacklists
        env:
          KEY1: ${{ secrets.ABUSEIPDB_API_KEY_1 }}
          KEY2: ${{ secrets.ABUSEIPDB_API_KEY_2 }}
          KEY3: ${{ secrets.ABUSEIPDB_API_KEY_3 }}
        run: |
          set -e

          KEYS=("$KEY1" "$KEY2" "$KEY3")
          ABUSEIPDB_API_KEY=${KEYS[$RANDOM % ${#KEYS[@]}]}

          export ABUSEIPDB_API_KEY

          python abuseipdb_feed.py \
            --min-score "${MIN_SCORE}" \
            --confidence "${CONFIDENCE}" \
            --limit "${LIMIT}" \
            --output-txt abuseipdb_blacklist.txt \
            --output-md abuseipdb_report.md \
            --seen-db seen_db.json

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add abuseipdb_blacklist.txt abuseipdb_report.md seen_db.json

          if git diff --staged --quiet; then
            echo "Keine Änderungen"
            exit 0
          fi

          git commit -m "AbuseIPDB Feed $(date -u '+%Y-%m-%d %H:%M UTC')"

          git pull --rebase origin main
          git push origin main
