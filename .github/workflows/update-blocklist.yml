name: Update All Countries IPv4 Blocklist

on:
  schedule:
    - cron: '30 1 * * 1'  # Jeden Montag um 01:30 UTC (vor combined-Lauf um 03:00, 90min Puffer)
    - cron: '30 1 * * 3'  # Jeden Mittwoch um 01:30 UTC (vor combined-Lauf um 03:00, 90min Puffer)
  workflow_dispatch:     # Manuell startbar

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update-blocklist:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Download All Countries IPv4 Ranges
