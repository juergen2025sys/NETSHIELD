              "TK": ("oceania", "tokelau"),
              "TO": ("oceania", "tonga"),
              "TV": ("oceania", "tuvalu"),
              "VU": ("oceania", "vanuatu"),
              "WF": ("oceania", "wallis_and_futuna"),
              "WS": ("oceania", "samoa"),
              "AQ": ("oceania", "antarctica"),
              # South America
              "AR": ("south_america", "argentina"),
              "BO": ("south_america", "bolivia"),
              "BR": ("south_america", "brazil"),
              "BV": ("south_america", "bouvet_island"),
              "CL": ("south_america", "chile"),
              "CO": ("south_america", "colombia"),
              "EC": ("south_america", "ecuador"),
              "FK": ("south_america", "falkland_islands"),
              "GF": ("south_america", "french_guiana"),
              "GY": ("south_america", "guyana"),
              "PE": ("south_america", "peru"),
              "PY": ("south_america", "paraguay"),
              "SR": ("south_america", "suriname"),
              "UY": ("south_america", "uruguay"),
              "VE": ("south_america", "venezuela"),
          }

          CONTINENTS = ["africa", "asia", "europe", "north_america", "oceania", "south_america"]

          base_url = "https://country-ip-blocks.hackinggate.com"
          all_ips  = set()                # für all_countries_ipv4.txt
          continent_ips = {c: set() for c in CONTINENTS}
          country_data  = {}              # cc → sorted list of entries
          errors = []

          def sort_key(entry):
              try:
                  net = ipaddress.ip_network(entry.split()[0], strict=False)
                  return (int(net.network_address), net.prefixlen)
              except Exception:
                  return (0, 0)

          def fetch_country(url, retries=3, timeout=15):
              for attempt in range(1, retries + 1):
                  try:
                      with urllib.request.urlopen(url, timeout=timeout) as response:
                          return response.read().decode("utf-8"), None
                  except urllib.error.HTTPError as e:
                      # 404 = Land hat keine IP-Ranges → sofort zurückgeben, kein Retry
                      if e.code == 404:
                          return None, e
                      # Transiente Serverfehler → Retry
                      if e.code in (429, 500, 502, 503, 504) and attempt < retries:
                          time.sleep(attempt * 2)
                      else:
                          return None, e
                  except Exception as e:
                      if attempt < retries:
                          time.sleep(attempt * 2)
                      else:
                          return None, e
              return None, Exception("Unbekannter Fehler")

          countries = list(COUNTRY_MAP.keys())
          print(f"Lade {len(countries)} Länder von hackinggate.com ...")

          # FIX #14: Elapsed-time Guard – Abbruch bei >15min damit der Commit-Schritt
          # noch innerhalb des 20min Job-Timeouts ausgeführt werden kann.
          _loop_start = time.monotonic()
          MAX_LOOP_SECONDS = 900  # 15 Minuten

          for i, cc in enumerate(countries):
              if time.monotonic() - _loop_start > MAX_LOOP_SECONDS:
                  print(f"WARNUNG: Elapsed-time Guard ausgelöst nach {i} Ländern ({i}/{len(countries)}) – "
                        f"Rest wird beim nächsten Run geladen. Bisher geladene Daten werden gespeichert.")
                  break
              continent, name = COUNTRY_MAP[cc]
              url = f"{base_url}/{cc}_IPv4.txt"
              raw, err = fetch_country(url)

              if raw is not None:
                  lines = [
                      l.strip()
                      for l in raw.splitlines()
                      if l.strip() and l[0].isdigit()
                  ]
                  all_ips.update(lines)
                  continent_ips[continent].update(lines)
                  country_data[cc] = (continent, name, sorted(lines, key=sort_key))
                  if lines:
                      print(f"[{i+1}/{len(countries)}] {cc} ({name}) → {len(lines)} entries")
                  else:
                      # Datei vorhanden aber leer → Land/Insel hat keine registrierten IP-Ranges
                      print(f"[{i+1}/{len(countries)}] {cc} ({name}) → 0 entries (keine IP-Ranges registriert)")
              elif isinstance(err, urllib.error.HTTPError) and err.code == 404:
                  # 404 = Datei existiert nicht → Land hat keine IP-Ranges bei hackinggate
                  print(f"[{i+1}/{len(countries)}] {cc} ({name}) → 0 entries (404 – keine IP-Ranges)")
                  country_data[cc] = (continent, name, [])
              elif isinstance(err, urllib.error.HTTPError):
                  print(f"[{i+1}/{len(countries)}] {cc} ({name}) → ERROR HTTP {err.code}")
                  errors.append(cc)
              else:
                  print(f"[{i+1}/{len(countries)}] {cc} ({name}) → ERROR: {err}")
                  errors.append(cc)

              time.sleep(0.1)

          # ── Leerungsschutz ────────────────────────────────────────────────
          # hackinggate liefert ~255k aggregierte Ranges. Bei partiellem Ausfall
          # könnten trotzdem 200k+ ankommen → Schwelle auf 240k erhöht für
          # zuverlässigeren Schutz vor teilweise fehlgeschlagenen Runs.
          MIN_ENTRIES = 240_000
          if len(all_ips) < MIN_ENTRIES:
              msg = (f"Nur {len(all_ips)} IP-Ranges geladen (< {MIN_ENTRIES}) – "
                     f"Leerungsschutz aktiv, Dateien werden NICHT überschrieben.")
              print(f"::warning file=update-blocklist.yml::{msg}")
              print(f"WARNUNG: {msg}")
              sys.exit(1)

          # ── 1) all_countries_ipv4.txt ────────────────────────────────────
          sorted_all = sorted(all_ips, key=sort_key)
          with open("all_countries_ipv4.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(sorted_all) + "\n")
          print(f"\nall_countries_ipv4.txt: {len(sorted_all)} entries")

          # ── 2) continents/*.txt ──────────────────────────────────────────
          os.makedirs("continents", exist_ok=True)
          for continent in CONTINENTS:
              ips  = sorted(continent_ips[continent], key=sort_key)
              path = f"continents/{continent}_ipv4.txt"
              with open(path, "w", encoding="utf-8") as f:
                  f.write(f"# NETSHIELD – {continent.replace('_', ' ').title()} IPv4 Ranges\n")
                  f.write(f"# Aktualisiert: {now_str}\n")
                  f.write(f"# IP-Ranges: {len(ips)}\n\n")
                  f.write("\n".join(ips) + "\n")
              print(f"continents/{continent}_ipv4.txt: {len(ips)} entries")

          # ── 3) countries/{continent}/{name}_ipv4.txt ─────────────────────
          for cc, (continent, name, ips) in country_data.items():
              dir_path = f"countries/{continent}"
              os.makedirs(dir_path, exist_ok=True)
              path = f"{dir_path}/{name}_ipv4.txt"
              with open(path, "w", encoding="utf-8") as f:
                  f.write(f"# NETSHIELD – {name.replace('_', ' ').title()} ({cc}) IPv4 Ranges\n")
                  f.write(f"# Aktualisiert: {now_str}\n")
                  f.write(f"# IP-Ranges: {len(ips)}\n\n")
                  if ips:
                      f.write("\n".join(ips) + "\n")
              print(f"countries/{continent}/{name}_ipv4.txt: {len(ips)} entries")

          print(f"\nDone! Gesamt: {len(sorted_all)} IP-Ranges")
          if errors:
              print(f"Fehler bei: {', '.join(errors)}")
          EOF

      - name: Commit and Push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add all_countries_ipv4.txt continents/ countries/
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "Update All Countries IPv4: $(date -u '+%Y-%m-%d %H:%M') UTC"
            for attempt in 1 2 3 4 5; do
              echo "Push-Versuch $attempt..."
              git fetch origin ${GITHUB_REF_NAME}
              if git rebase -X theirs origin/${GITHUB_REF_NAME}; then
                if git push origin HEAD:${GITHUB_REF_NAME}; then
                  echo "Push erfolgreich (Versuch $attempt)"
                  exit 0
                fi
              else
                git checkout --theirs -- all_countries_ipv4.txt 2>/dev/null || true
                git checkout --theirs -- continents/ countries/ 2>/dev/null || true
                git add all_countries_ipv4.txt continents/ countries/ 2>/dev/null || true
                GIT_EDITOR=true git rebase --continue 2>/dev/null || git rebase --skip
              fi
              sleep $((attempt * 3))
            done
            echo "FEHLER: Push nach 5 Versuchen fehlgeschlagen"
            exit 1
          fi
