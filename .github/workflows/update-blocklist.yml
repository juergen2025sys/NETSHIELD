name: Update All Countries IPv4 Blocklist

on:
  schedule:
    - cron: '30 2 * * 1'  # Jeden Montag um 02:30 UTC (vor combined-Lauf um 03:00)
    - cron: '30 2 * * 3'  # Jeden Mittwoch um 02:30 UTC (vor combined-Lauf um 03:00)
  workflow_dispatch:     # Manuell startbar

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update-blocklist:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Download All Countries IPv4 Ranges
        run: |
          python3 << 'EOF'
          import urllib.request
          import urllib.error
          import time
          import ipaddress

          countries = [
              "AF","AX","AL","DZ","AS","AD","AO","AI","AQ","AG","AR","AM","AW","AU","AT","AZ",
              "BS","BH","BD","BB","BY","BE","BZ","BJ","BM","BT","BO","BQ","BA","BW","BV","BR",
              "IO","BN","BG","BF","BI","CV","KH","CM","CA","KY","CF","TD","CL","CN","CX","CC",
              "CO","KM","CG","CD","CK","CR","CI","HR","CU","CW","CY","CZ","DK","DJ","DM","DO",
              "EC","EG","SV","GQ","ER","EE","SZ","ET","FK","FO","FJ","FI","FR","GF","PF","TF",
              "GA","GM","GE","DE","GH","GI","GR","GL","GD","GP","GU","GT","GG","GN","GW","GY",
              "HT","HM","VA","HN","HK","HU","IS","IN","ID","IR","IQ","IE","IM","IL","IT","JM",
              "JP","JE","JO","KZ","KE","KI","KP","KR","KW","KG","LA","LV","LB","LS","LR","LY",
              "LI","LT","LU","MO","MG","MW","MY","MV","ML","MT","MH","MQ","MR","MU","YT","MX",
              "FM","MD","MC","MN","ME","MS","MA","MZ","MM","NA","NR","NP","NL","NC","NZ","NI",
              "NE","NG","NU","NF","MK","MP","NO","OM","PK","PW","PS","PA","PG","PY","PE","PH",
              "PN","PL","PT","PR","QA","RE","RO","RU","RW","BL","SH","KN","LC","MF","PM","VC",
              "WS","SM","ST","SA","SN","RS","SC","SL","SG","SX","SK","SI","SB","SO","ZA","GS",
              "SS","ES","LK","SD","SR","SJ","SE","CH","SY","TW","TJ","TZ","TH","TL","TG","TK",
              "TO","TT","TN","TR","TM","TC","TV","UG","UA","AE","GB","US","UM","UY","UZ","VU",
              "VE","VN","VG","VI","WF","EH","YE","ZM","ZW"
          ]

          base_url = "https://country-ip-blocks.hackinggate.com"
          all_ips = set()
          errors = []

          def sort_key(entry):
              net = ipaddress.ip_network(entry, strict=False)
              return (int(net.network_address), net.prefixlen)

          def fetch_country(url, retries=3, timeout=15):
              """Fetch mit bis zu 3 Versuchen bei Netzwerkfehlern."""
              for attempt in range(1, retries + 1):
                  try:
                      with urllib.request.urlopen(url, timeout=timeout) as response:
                          return response.read().decode("utf-8"), None
                  except urllib.error.HTTPError as e:
                      return None, e  # HTTP-Fehler nicht wiederholen (404 etc.)
                  except Exception as e:
                      if attempt < retries:
                          time.sleep(attempt * 2)  # 2s, 4s zwischen Versuchen
                      else:
                          return None, e
              return None, Exception("Unbekannter Fehler")

          for i, cc in enumerate(countries):
              url = f"{base_url}/{cc}_IPv4.txt"
              raw, err = fetch_country(url)

              if raw is not None:
                  lines = [
                      l.strip()
                      for l in raw.splitlines()
                      if l.strip() and l[0].isdigit()
                  ]
                  all_ips.update(lines)
                  print(f"[{i+1}/{len(countries)}] {cc} - {len(lines)} entries")
              elif isinstance(err, urllib.error.HTTPError) and err.code == 404:
                  print(f"[{i+1}/{len(countries)}] {cc} - 0 entries (404)")
              elif isinstance(err, urllib.error.HTTPError):
                  print(f"[{i+1}/{len(countries)}] {cc} - ERROR: HTTP {err.code}")
                  errors.append(cc)
              else:
                  print(f"[{i+1}/{len(countries)}] {cc} - ERROR nach 3 Versuchen: {err}")
                  errors.append(cc)

              time.sleep(0.1)

          sorted_ips = sorted(all_ips, key=sort_key)

          with open("all_countries_ipv4.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(sorted_ips) + "\n")

          print(f"\nDone! Total: {len(sorted_ips)} IP ranges")
          if errors:
              print(f"Errors: {', '.join(errors)}")
          EOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add all_countries_ipv4.txt
          git diff --staged --quiet || git commit -m "Update All Countries IPv4: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin ${GITHUB_REF_NAME}
          git push origin HEAD:${GITHUB_REF_NAME}
