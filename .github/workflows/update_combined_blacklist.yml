          elif not db:
              print("Keine seen_db gefunden, kein Backup vorhanden – starte neu.")

          # ── FIX #1: false_positives_set.json einlesen ─────────────────────
          # false_positive_checker schreibt diese Datei; combined liest sie hier
          # und schließt die IPs beim Feed-Ingest aus – kein direktes Schreiben
          # in combined_threat_blacklist_ipv4.txt durch den FP-Checker mehr.
          FP_SET_FILE = "false_positives_set.json"
          _fp_networks = []
          _fp_ips      = set()
          if os.path.exists(FP_SET_FILE):
              try:
                  with open(FP_SET_FILE) as _f:
                      _fp_data = json.load(_f)
                  for _e in _fp_data.get("ips", []):
                      try:
                          if "/" in _e:
                              _fp_networks.append(ipaddress.ip_network(_e, strict=False))
                          else:
                              _fp_ips.add(_e)
                      except Exception as _suppressed:
                          print(f"WARN: suppressed Exception: {_suppressed}", file=sys.stderr)
                  print(f"false_positives_set.json: {len(_fp_ips)} IPs + {len(_fp_networks)} CIDRs als FP geladen")
              except Exception as _ex:
                  print(f"WARNUNG: false_positives_set.json nicht lesbar: {_ex}")

          # is_in_fp_set() → importiert aus netshield_common
          # is_valid_public_ipv4() → importiert aus netshield_common
          # CIDR_RE wird aus netshield_common importiert (strikte Lookbehind-
          # Variante); lokale \b-Definition entfernt – ungenutzt und schwächer.

          # ── FIX PERF-COMBINED: Batch-Filter mit Binary-Search ────────────
          # is_protected_entry(), is_whitelisted(), is_in_fp_set() iterieren
          # jeweils über 502-2945 Netzwerk-Ranges pro IP-Aufruf.
          # Bei 4,5M IPs × (502+502+2945) Checks = ~45 Min verschwendet.
          # Lösung: sortierte Intervall-Listen + bisect → O(N × log K).
          import bisect as _bisect

          def _merge_intervals(nets):
              """Sortiert und merged überlappende/benachbarte IP-Intervalle.

              FIX BUG-11: bisect_right findet für eine IP nur das zuletzt
              startende Intervall mit start <= ip. Bei überlappenden CIDRs
              (z.B. 10.0.0.0/8 + 10.1.0.0/16 in der Whitelist) wird die
              IP 10.0.5.5 fälschlich NICHT als protected erkannt, weil
              bisect das kleinere Intervall 10.1.0.0/16 findet und 10.0.5.5
              liegt außerhalb.
              Durch Merging zu einem einzigen Intervall (10.0.0.0-10.255.255.255)
              wird der Treffer zuverlässig gefunden.
              Whitelist hat 502+ CIDRs mit realen Überlappungen (AWS, Google, etc.).
              """
              intervals = sorted(
                  (int(n.network_address), int(n.broadcast_address))
                  for n in nets
              )
              merged = []
              for lo, hi in intervals:
                  if merged and lo <= merged[-1][1] + 1:
                      merged[-1] = (merged[-1][0], max(merged[-1][1], hi))
                  else:
                      merged.append((lo, hi))
              return merged

          # Alle geschützten Netzwerke (Whitelist + RFC1918 + FP-CIDRs) zusammenführen
          _all_protected_nets = list(_protected_networks) + list(_whitelist_networks)
          if _fp_networks:
              _all_protected_nets.extend(_fp_networks)

          # FIX BUG-11: _merge_intervals statt rohem sorted() – verhindert
          # Whitelist-Leaks bei überlappenden CIDRs (AWS /8 + spezifischere /16 etc.)
          _prot_intervals = _merge_intervals(_all_protected_nets)
          _prot_starts = [iv[0] for iv in _prot_intervals]

          # Whitelist+FP (ohne RFC1918) – für Cleanup-Scans
          _wl_fp_nets = list(_whitelist_networks)
          if _fp_networks:
              _wl_fp_nets.extend(_fp_networks)
          _wl_fp_intervals = _merge_intervals(_wl_fp_nets)
          _wl_fp_starts = [iv[0] for iv in _wl_fp_intervals]

          def _fast_is_protected(ip_str):
              """Schneller Protected-Check via Binary-Search (O(log K) statt O(K)).
              FIX BUG-CIDR1: CIDRs fallen auf is_protected_entry() zurück,
              da Binary-Search nur die Netzadresse prüft, nicht den Range-Overlap.
              CIDRs sind <5% der Einträge → kein Performance-Impact."""
              try:
                  if '/' in ip_str:
                      return is_protected_entry(ip_str)
                  ip_int = int(ipaddress.ip_address(ip_str))
                  pos = _bisect.bisect_right(_prot_starts, ip_int) - 1
                  if pos >= 0 and ip_int <= _prot_intervals[pos][1]:
                      return True
                  # Einzel-IPs im FP-Set (O(1) Set-Lookup)
                  return ip_str in _fp_ips
              except Exception:
                  return False

          def _fast_is_wl_or_fp(ip_str):
              """Schneller Whitelist+FP-Check via Binary-Search.
              FIX BUG-CIDR1: CIDRs fallen auf is_whitelisted()/is_in_fp_set() zurück."""
              try:
                  if ip_str in _fp_ips:
                      return True
                  if '/' in ip_str:
                      return is_whitelisted(ip_str) or is_in_fp_set(ip_str)
                  ip_int = int(ipaddress.ip_address(ip_str))
                  pos = _bisect.bisect_right(_wl_fp_starts, ip_int) - 1
                  return pos >= 0 and ip_int <= _wl_fp_intervals[pos][1]
              except Exception:
                  return False

          print(f"Binary-Search-Index: {len(_prot_intervals)} Protected + {len(_wl_fp_intervals)} WL/FP Intervalle")

          # is_valid_public_cidr() → importiert aus netshield_common
          # FIX PERF-PRECLEAN: Pre-Loop-Cleanup entfernt. Der frühere
          # Full-Scan über alle 4,8M seen_db-Einträge vor dem Feed-Ingest
          # (`Geschützte Alt-Einträge aus seen_db entfernt`) war redundant –
          # der zusammengeführte Cleanup-Pass nach dem Feed-Ingest fängt
          # exakt dieselben IPs ab. Der Pre-Loop kostete 3:26 ohne neuen
          # Output. Defense-in-Depth bleibt erhalten: Final-Cleanup deckt
          # protected/whitelist/RFC1918 + neu reingekommene IPs aus den
          # Feeds ab. Falls eine Regression hier auftaucht (Whitelist-Leak),
          # einfach die gestrichenen Zeilen wiederherstellen.
          # ──────────────────────────────────────────────────────────────
          # ENTFERNT:
          #   removed_preexisting_protected = 0
          #   _protected_old = [ip for ip in db if _fast_is_protected(ip)]
          #   for ip in _protected_old: db.pop(ip, None); ...
          #   if removed_preexisting_protected: print(...)
          # ──────────────────────────────────────────────────────────────

          # parse_feed_entries() → importiert aus netshield_common
          def fetch_ips(name, url):
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "NETSHIELD/3.0"})
                  opener = urllib.request.build_opener(urllib.request.HTTPRedirectHandler())
                  with opener.open(req, timeout=22) as r:
                      raw = r.read(READ_LIMIT).decode("utf-8", errors="ignore")
                  found = parse_entries(raw, use_protected_check=True)
                  ips   = len([e for e in found if '/' not in e])
                  cidrs = len([e for e in found if '/' in e])
                  print(f"OK  {name}: {ips} IPs" + (f" + {cidrs} CIDRs" if cidrs else ""))
                  return name, found
              except Exception as e:
                  print(f"ERR  {name}: {type(e).__name__}: {e}")
                  print(f"::warning file=update_combined_blacklist.yml::Feed fetch failed [{name}]: {type(e).__name__}: {e}")
                  return name, set()

          # ── Alle Feeds laden: DataPlane zuerst, dann den Rest parallel ────
          ip_in_hq      = set()
          feed_stats    = []

          ip_feeds_today = {}   # ip → set(feed_namen) für diesen Run

          def _ingest(name, ips):
              """Ergebnis eines fetch_ips-Calls in die laufenden Datenstrukturen einpflegen."""
              for ip in ips:
                  if name in HIGH_QUALITY:
                      ip_in_hq.add(ip)
                  if ip not in ip_feeds_today:
                      ip_feeds_today[ip] = set()
                  ip_feeds_today[ip].add(name)
              feed_stats.append((name, len(ips)))

          # ── Slow-Feeds (grosse Dateien mit langer Latenz) ──────────────
          # Laufen in eigener Phase 0 BEVOR andere Feeds starten – mit eigenem
          # ThreadPool, damit sie nicht mit den 15 Workern von Phase 2 um Slots
          # kaempfen. Im letzten Run brauchten diese 5 Feeds 19-33 min Phase-2-
          # Start-Latenz, was Timeouts erzeugte. Separat gestartet laufen sie
          # komplett parallel zum Rest.
          SLOW_FEED_NAMES = {
              "bitwire_ipblocklist",
              "black_mirror",
              "bluetack_blacklist",
              "firehol_anonymous",
              "magicteamc_bad_ips",
          }
          SLOW_SOURCES = {n: u for n, (u, _) in SOURCES.items() if n in SLOW_FEED_NAMES}
          DP_SOURCES   = {n: u for n, (u, _) in SOURCES.items() if n.startswith("dataplane_")}
          REST_SOURCES = {n: (u, hq) for n, (u, hq) in SOURCES.items()
                          if n not in SLOW_FEED_NAMES and not n.startswith("dataplane_")}

          print("── Phase 0: Slow-Feeds (parallel, eigener Pool) ──────────────────")
          slow_ex = ThreadPoolExecutor(max_workers=len(SLOW_SOURCES) or 1)
          slow_futures = {slow_ex.submit(fetch_ips, n, u): n for n, u in SLOW_SOURCES.items()}

          # Phase 1 – DataPlane-Feeds zuerst (17 kleine Dateien, ~5–10 s)
          # Werden bewusst zuerst geladen weil sie klein und schnell sind und
          # die HQ-Bestätigungen früh in ip_in_hq landen sollen. Filter via
          # n.startswith("dataplane_") greift automatisch bei neuen Feeds.
          print("── Phase 1: DataPlane-Feeds ──────────────────────────────────────")
          with ThreadPoolExecutor(max_workers=len(DP_SOURCES)) as dp_ex:
              dp_futures = {dp_ex.submit(fetch_ips, n, u): n for n, u in DP_SOURCES.items()}
              try:
                  for future in as_completed(dp_futures, timeout=60):
                      name, ips = future.result()
                      _ingest(name, ips)
              except TimeoutError:
                  pending = sorted(n for f, n in dp_futures.items() if not f.done())
                  for f in dp_futures:
                      if not f.done():
                          f.cancel()
                  print(f"::warning file=update_combined_blacklist.yml::DataPlane-Timeout – {len(pending)} Feed(s) abgebrochen: {', '.join(pending)}")
                  print(f"WARNUNG: DataPlane-Phase Timeout – {', '.join(pending)} abgebrochen")

          # Phase 2 – Alle übrigen Feeds parallel (ohne Slow-Feeds und DataPlane)
          print("── Phase 2: Restliche Feeds ──────────────────────────────────────")
          with ThreadPoolExecutor(max_workers=15) as executor:
              futures = {executor.submit(fetch_ips, n, u): n for n, (u, _) in REST_SOURCES.items()}
              try:
                  for future in as_completed(futures, timeout=880):
                      name, ips = future.result()
                      _ingest(name, ips)
              except TimeoutError:
                  pending = sorted(n for f, n in futures.items() if not f.done())
                  for f in futures:
                      if not f.done():
                          f.cancel()
                  print(f"::warning file=update_combined_blacklist.yml::Haupt-Feed-Timeout nach 900s – {len(pending)} Feed(s) abgebrochen: {', '.join(pending[:10])}{'…' if len(pending) > 10 else ''}")
                  print(f"WARNUNG: Haupt-Feed-Block Timeout – {len(pending)} Feed(s) abgebrochen, bereits geladene Feeds werden weiterverarbeitet")

          # Phase 3 – Slow-Feeds einsammeln (laufen seit Phase 0 im Hintergrund)
          print("── Phase 3: Slow-Feeds einsammeln ────────────────────────────────")
          try:
              for future in as_completed(slow_futures, timeout=2400):
                  name, ips = future.result()
                  _ingest(name, ips)
          except TimeoutError:
              pending = sorted(n for f, n in slow_futures.items() if not f.done())
              for f in slow_futures:
                  if not f.done():
                      f.cancel()
              print(f"::warning file=update_combined_blacklist.yml::Slow-Feed-Timeout nach 2400s – {len(pending)} Feed(s) abgebrochen: {', '.join(pending)}")
              print(f"WARNUNG: Slow-Feed-Block Timeout – {len(pending)} Feed(s) abgebrochen")
          slow_ex.shutdown(wait=False)

          # ── Lokale Sub-Workflow-Dateien einlesen ───────────────────────────
          LOCAL_FEEDS = {
              # tor_exit_nodes.txt entfernt
              "cve_exploit_ips.txt":             True,
              "bot_detector_blacklist_ipv4.txt": False,
              "honeypot_ips.txt":                True,
              "honeydb_ips.txt":                 True,   # HoneyDB Community Honeypot Network (API)
              "abuseipdb_api_blacklist.txt":     True,   # AbuseIPDB API (Round-Robin, HQ)
              # FIX CACHE-LOSS: Community-gemeldete IPs werden von community_ip_report.yml
              # in diese Datei geschrieben und hier als LOCAL_FEED eingelesen.
              # HQ=False: Einzelne Community-Meldungen sind keine vertrauenswürdige Quelle;
              # HQ-Promotion erfolgt erst bei community_count >= 3 (in community_ip_report.yml).
              "community_reported_ips.txt":      False,
          }
          # FIX: Lokale HQ-Dateinamen für hq_feed_names_today-Berechnung.
          # Dateinamen wie "honeydb_ips.txt" sind nicht in HIGH_QUALITY (Feed-Namen),
          # werden aber als HQ-Quelle behandelt → müssen separat erfasst werden damit
          # hq_feeds-Zähler in seen_db die lokalen HQ-Dateien korrekt mitzählt.
          LOCAL_HQ_NAMES = {name for name, is_hq in LOCAL_FEEDS.items() if is_hq}
          # FIX STALE1: Alters-Check für lokale Feed-Dateien.
          # Sub-Workflows schreiben einen "# Aktualisiert: YYYY-MM-DD HH:MM UTC"-Header.
          # Bei > 48h Alter (sub-workflow ausgefallen) GitHub Warning ausgeben.
          #
          # FIX STALE2: update_confidence_blacklist fehlte im Alters-Check.
          # blacklist_confidence40_ipv4.txt und watchlist_confidence25to39_ipv4.txt
          # sind keine LOCAL_FEEDS (werden nicht als IP-Quelle eingelesen), wurden
          # deshalb nie auf Aktualität geprüft. Fehlt ein confidence-Run, merkt
          # combined das nicht. Beide Dateien werden jetzt separat überwacht.
          _LOCAL_FEED_MAX_AGE_HOURS = 48
          _ts_re = re.compile(r'#\s*Aktualisiert:\s*(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2})\s*UTC')
          _EXTRA_AGE_CHECK_FILES = [
              "blacklist_confidence40_ipv4.txt",       # update_confidence_blacklist
              "watchlist_confidence25to39_ipv4.txt",   # update_confidence_blacklist
          ]
          for _extra_file in _EXTRA_AGE_CHECK_FILES:
              if not os.path.exists(_extra_file):
                  continue
              with open(_extra_file) as _ef:
                  _extra_raw = _ef.read(4096)  # Header reicht, kein vollständiges Lesen nötig
              _ts_m_extra = _ts_re.search(_extra_raw)
              if _ts_m_extra:
                  try:
                      _extra_dt = datetime.strptime(_ts_m_extra.group(1), "%Y-%m-%d %H:%M").replace(tzinfo=timezone.utc)
                      _extra_age_h = (now - _extra_dt).total_seconds() / 3600
                      if _extra_age_h > _LOCAL_FEED_MAX_AGE_HOURS:
                          _extra_msg = (f"{_extra_file} ist {_extra_age_h:.0f}h alt "
                                        f"(letztes Update: {_ts_m_extra.group(1)} UTC) – "
                                        f"update_confidence_blacklist möglicherweise ausgefallen")
                          print(f"::warning file=update_combined_blacklist.yml::{_extra_msg}")
                          print(f"WARNUNG: {_extra_msg}")
                  except Exception as _suppressed:
                      print(f"WARN: suppressed Exception: {_suppressed}", file=sys.stderr)
          for local_file, is_hq_local in LOCAL_FEEDS.items():
              if not os.path.exists(local_file):
                  print(f"  SKIP (nicht vorhanden): {local_file}")
                  continue
              with open(local_file) as lf:
                  raw_local = lf.read()
              # Alters-Check
              _ts_m = _ts_re.search(raw_local)
              if _ts_m:
                  try:
                      _file_dt = datetime.strptime(_ts_m.group(1), "%Y-%m-%d %H:%M").replace(tzinfo=timezone.utc)
                      _age_h = (now - _file_dt).total_seconds() / 3600
                      if _age_h > _LOCAL_FEED_MAX_AGE_HOURS:
                          _stale_msg = (f"{local_file} ist {_age_h:.0f}h alt "
                                        f"(letztes Update: {_ts_m.group(1)} UTC) – "
                                        f"Sub-Workflow möglicherweise ausgefallen")
                          print(f"::warning file=update_combined_blacklist.yml::{_stale_msg}")
                          print(f"WARNUNG: {_stale_msg}")
                  except Exception as _suppressed:
                      print(f"WARN: suppressed Exception: {_suppressed}", file=sys.stderr)
              local_ips = parse_entries(raw_local, use_protected_check=True)
              for entry in local_ips:
                  if is_hq_local:
                      ip_in_hq.add(entry)
                  if entry not in ip_feeds_today:
                      ip_feeds_today[entry] = set()
                  ip_feeds_today[entry].add(local_file)
              ips_l   = len([e for e in local_ips if '/' not in e])
              cidrs_l = len([e for e in local_ips if '/' in e])
              feed_stats.append((local_file, len(local_ips)))
              print(f"  Lokal: {local_file} → {ips_l} IPs" + (f" + {cidrs_l} CIDRs" if cidrs_l else "") + f" (HQ={is_hq_local})")


          # ── Auto-discovered Feeds einlesen ─────────────────────────────────
          AUTO_FEEDS_FILE = "auto_discovered_feeds.json"
          if os.path.exists(AUTO_FEEDS_FILE):
              try:
                  with open(AUTO_FEEDS_FILE) as af:
                      auto_data = json.load(af)
                  auto_feeds = auto_data.get("feeds", [])
                  print(f"  Auto-discovered Feeds: {len(auto_feeds)}")

                  def fetch_auto(feed):
                      return fetch_ips(feed["name"], feed["url"])

                  with ThreadPoolExecutor(max_workers=5) as ex:
                      futures = {ex.submit(fetch_auto, f): f["name"] for f in auto_feeds}
                      try:
                          for future in as_completed(futures, timeout=110):
                              name, ips = future.result()
                              for ip in ips:
                                  # Auto-discovered Feeds sind nicht HQ
                                  if ip not in ip_feeds_today:
                                      ip_feeds_today[ip] = set()
                                  ip_feeds_today[ip].add(name)
                              feed_stats.append((name, len(ips)))
                      except TimeoutError:
                          pending = sorted(name for future, name in futures.items() if not future.done())
                          for future in futures:
                              if not future.done():
                                  future.cancel()
                          print(f"  WARNUNG: Auto-Feeds Timeout – {len(pending)} Feed(s) abgebrochen: {', '.join(pending[:8])}{'…' if len(pending) > 8 else ''}")
              except Exception as e:
                  print(f"  WARNUNG: auto_discovered_feeds.json Fehler: {e}")
          else:
              print(f"  SKIP: {AUTO_FEEDS_FILE} nicht vorhanden")

          # ── seen_db aktualisieren ─────────────────────────────────────────
          #
          # Felder pro IP:
          #   first        – erster Sichttag (unveränderlich)
          #   last         – letzter Tag an dem die IP "stark bestätigt" war:
          #                  >= 2 verschiedene Feeds HEUTE oder mindestens 1 HQ-Feed HEUTE
          #                  Statische Mega-Listen (romainmarcoux 300k etc.) die sich
          #                  nicht täglich ändern, aktualisieren "last" NICHT alleine.
          #   hq           – True wenn IP je in einem HQ-Feed gesehen wurde
          #   feeds        – akkumulierte Feed-Namen (für Persistenz-Score)
          #   hq_feeds     – Anzahl verschiedener HQ-Feeds die diese IP je gemeldet haben
          #   today_count  – Anzahl Feeds die diese IP im LETZTEN RUN gemeldet haben
          #                  (wird bei jedem Run überschrieben, kein Akkumulieren)
          #   today_hq     – True wenn mindestens 1 HQ-Feed diese IP heute gemeldet hat
          #   days_seen    – Anzahl verschiedener Tage an denen "stark bestätigt" wurde
          #                  (echter Multi-Tag-Bestätigungszähler)
          #
          # "last" NUR aktualisieren wenn heute durch HQ-Feed bestätigt:
          # Non-HQ Feeds setzen "last" nie → statische Listen halten IPs nicht am Leben

          # FIX PERF-UPDATE: Konstanten Set-Ausdruck vor die Schleife hoisten.
          # (HIGH_QUALITY | LOCAL_HQ_NAMES) wurde pro IP neu konstruiert ~4M-mal.
          # Set-Vereinigung ist O(N+M); 4M × ~80 elements = wenig pro Aufruf,
          # aber summiert messbar. Einmal vor der Schleife reicht.
          _HQ_AND_LOCAL = HIGH_QUALITY | LOCAL_HQ_NAMES

          for ip, today_feeds in ip_feeds_today.items():
              # FIX PERF-COMBINED: Binary-Search statt is_whitelisted() + is_in_fp_set()
              if _fast_is_wl_or_fp(ip):
                  continue
              today_count = len(today_feeds)
              today_is_hq = ip in ip_in_hq

              # HQ-Feed-Anzahl für diese IP heute (benannte Feeds + lokale HQ-Dateien)
              # FIX: LOCAL_HQ_NAMES ergänzt – Dateinamen wie "honeydb_ips.txt" sind
              # nicht in HIGH_QUALITY, müssen aber als HQ-Quelle mitzählen.
              # WICHTIG: Muss VOR strongly_confirmed_today berechnet werden.
              hq_feed_names_today = today_feeds & _HQ_AND_LOCAL

              # FIX BUG-9: "Stark bestätigt" = mindestens 2 verschiedene
              # HQ-Feed-FAMILIEN HEUTE (nicht 2 Feed-Namen). Vorher zählten
              # firehol_level1 + firehol_level2 als 2 unabhängige Bestätigungen,
              # obwohl beide derselbe Upstream (FireHOL-Aggregator) sind.
              # Effekt des alten Bugs: IPs blieben ewig in active, solange ein
              # einziger Aggregator sie in seinem Cache hatte. Die Expiry-Uhr
              # wurde nie gestartet.
              # Familien-Mapping siehe HQ_FEED_FAMILIES oben. Feeds ohne
              # Eintrag dort sind ihre eigene Familie.
              #
              # Vorgänger-FIX AGGREGATOR1 (len >= 2 auf Feed-Namen) hatte das
              # Problem nur halb gelöst – genau derselbe Aggregator konnte
              # weiterhin mit mehreren Unterfeeds den Guard umgehen.
              hq_families_today = _hq_families_of(hq_feed_names_today)
              strongly_confirmed_today = len(hq_families_today) >= 2

              if ip in db:
                  try:
                      # FIX PERF-UPDATE: db[ip] in lokale Variable cachen.
                      # Vorher: 8 separate db[ip]-Lookups pro Iteration.
                      entry = db[ip]
                      if not isinstance(entry, dict):
                          raise TypeError(f"db[{ip}] ist kein dict")
                      existing_feeds = set(entry.get("feeds", []))

                      if strongly_confirmed_today:
                          prev_last = entry.get("last", "2000-01-01")
                          if prev_last != now_day:
                              # Neuer Bestätigungstag → days_seen erhöhen (startet bei 0)
                              entry["days_seen"] = entry.get("days_seen", 0) + 1
                          entry["last"] = now_day

                      # FIX PERF-LAZYSORT: per-IP sorted() entfernt. Wird in
                      # einem einzigen Sweep nach der Update-Schleife (nur ueber
                      # die heute beruehrten IPs in ip_feeds_today) sortiert,
                      # bevor seen_db geschrieben wird. Byte-Stabilitaet des
                      # seen_db_backup.json.gz bleibt dadurch erhalten – nur
                      # die Sortier-Arbeit wandert aus dem Hot-Loop heraus.
                      entry["feeds"]       = list(existing_feeds | today_feeds)
                      entry["today_count"] = today_count
                      entry["today_hq"]    = today_is_hq
                      if today_is_hq:
                          entry["hq"] = True
                      # FIX BUG-4: auto_today_count konsumieren und löschen.
                      # auto_feed_discovery schreibt dieses Feld bei seinen wöchentlichen
                      # Läufen; combined liest es hier einmal aus und entfernt es, damit
                      # stale Werte nicht in späteren Läufen von Konsumenten (confidence)
                      # fehlinterpretiert werden. Das Feld fließt NICHT ins today_count
                      # ein – es war nur ein Kommunikationskanal zwischen den Workflows.
                      # Die eigentliche Zählung auto-discovered IPs erfolgt über
                      # ip_feeds_today via den Feed-Namen (aus auto_discovered_feeds.json).
                      entry.pop("auto_today_count", None)
                      # FIX Bug3: hq_feeds als Set einzigartiger Feed-Namen akkumulieren.
                      # Vorher: rohe Addition pro Lauf → unbegrenztes Wachstum (8 Läufe/Tag × 40 HQ-Feeds).
                      # Jetzt: Zählt jede HQ-Feed-Quelle nur einmal, egal wie oft sie gemeldet hat.
                      existing_hq_names = set(entry.get("hq_feed_names", []))
                      existing_hq_names.update(hq_feed_names_today)
                      # FIX PERF-LAZYSORT: per-IP sorted() entfernt – siehe Sweep
                      # nach der Schleife.
                      entry["hq_feed_names"] = list(existing_hq_names)
                      entry["hq_feeds"]      = len(existing_hq_names)
                  except Exception as _corrupt:
                      print(f"WARN: Korrupter seen_db-Eintrag {ip}, wird neu angelegt: {_corrupt}", file=sys.stderr)
                      # FIX PERF-LAZYSORT: list() statt sorted() – Sweep nach
                      # der Schleife sortiert.
                      db[ip] = {
                          "first":          now_day,
                          "last":           now_day if today_is_hq else "2000-01-01",
                          "hq":             today_is_hq,
                          "feeds":          list(today_feeds),
                          "hq_feed_names":  list(hq_feed_names_today),
                          "hq_feeds":       len(hq_feed_names_today),
                          "today_count":    today_count,
                          "today_hq":       today_is_hq,
                          "days_seen":      1 if today_is_hq else 0,
                      }
              else:
                  # FIX PERF-LAZYSORT: list() statt sorted() – Sweep nach
                  # der Schleife sortiert.
                  db[ip] = {
                      "first":          now_day,
                      # FIX AGGREGATOR1: Neue IPs bekommen last=heute bei 1+ HQ-Feed.
                      # Nur das REFRESHEN von last bei bestehenden IPs braucht 2+ HQ-Feeds
                      # (strongly_confirmed_today). So kommen frische Feodo/ThreatFox-IPs
                      # sofort in active, altern aber nach 30 Tagen raus wenn nur 1
                      # Aggregator-Feed sie weitermeldet.
                      "last":           now_day if today_is_hq else "2000-01-01",
                      "hq":             today_is_hq,
                      "feeds":          list(today_feeds),
                      "hq_feed_names":  list(hq_feed_names_today),   # FIX Bug3: auch bei Neu-Einträgen
                      "hq_feeds":       len(hq_feed_names_today),
                      "today_count":    today_count,
                      "today_hq":       today_is_hq,
                      "days_seen":      1 if today_is_hq else 0,
                  }

          # ── FIX PERF-CLEANUP: Vier volle seen_db-Passes zu einem zusammengefasst.
          # Vorher liefen vier separate Schleifen ueber alle ~4,8M Eintraege:
          #   1) protected_runtime         (entfernt protected/whitelisted/RFC1918)
          #   2) Aufnahme-Filter           (entfernt IPs mit <2 Feeds und kein hq)
          #   3) 180/30-Tage-Expiry        (entfernt zu alte Eintraege)
          #   4) wl_cleanup                (entfernt whitelist/FP-Altlasten)
          # Jede Schleife dereferenziert dieselben dict-Keys neu und ruft die
          # bisect-Predicates erneut auf. Auf 4,8M Eintraegen waren das ~10–15
          # min reine Python-Iteration. Eine Schleife reicht: jede IP einmal
          # anschauen, alle Bedingungen pruefen, beim ersten Treffer mergen.
          # Counter-Semantik der vier alten Bloecke bleibt erhalten (gleiche
          # Logmeldungen, gleiche Reihenfolge der Pruefungen).
          protected_removed_runtime = 0
          aufnahme_removed = 0
          wl_cleanup_count = 0
          expired = []
          WATCHLIST_EXPIRY_DAYS = 30
          cutoff      = now - timedelta(days=EXPIRY_DAYS)
          cutoff_wl   = now - timedelta(days=WATCHLIST_EXPIRY_DAYS)

          _to_drop = []
          # FIX CRASH-GUARD: Outer try/except pro IP. Eine einzelne korrupte
          # seen_db-Zeile (Bytes statt String, dict mit defektem __getitem__,
          # NaN-Datum etc.) wuerde sonst die komplette Cleanup-Schleife
          # abbrechen und den Run nach 45 min ohne Output beenden.
          # Bei Crash: IP wird als korrupt markiert und gedroppt.
          _corrupt_dropped = 0
          for ip in list(db.keys()):
              try:
                  # 1) Protected (Whitelist + RFC1918/Reserved)
                  if _fast_is_protected(ip):
                      protected_removed_runtime += 1
                      _to_drop.append(ip)
                      continue
                  # 4) WL/FP-Altlasten (vorher in eigener Schleife nach Expiry)
                  if _fast_is_wl_or_fp(ip):
                      wl_cleanup_count += 1
                      _to_drop.append(ip)
                      continue
                  data = db.get(ip)
                  if not isinstance(data, dict):
                      aufnahme_removed += 1
                      _to_drop.append(ip)
                      continue
                  # 2) Aufnahme-Filter: >= 2 Feeds gesamt ODER hq ODER community_report
                  feeds = data.get("feeds", [])
                  if not isinstance(feeds, list):
                      _corrupt_dropped += 1
                      _to_drop.append(ip)
                      continue
                  if not (len(feeds) >= 2 or data.get("hq") or "community_report" in feeds):
                      aufnahme_removed += 1
                      _to_drop.append(ip)
                      continue
                  # 3) Expiry (Sentinel-Guard wie BUG-1)
                  try:
                      last_str  = safe_get_date(data, "last")
                      first_str = safe_get_date(data, "first", last_str)
                      last_seen  = datetime.strptime(last_str,  "%Y-%m-%d").replace(tzinfo=timezone.utc)
                      first_seen = datetime.strptime(first_str, "%Y-%m-%d").replace(tzinfo=timezone.utc)
                      if last_str == "2000-01-01":
                          if first_seen < cutoff_wl:
                              expired.append(ip)
                              _to_drop.append(ip)
                      else:
                          if last_seen < cutoff:
                              expired.append(ip)
                              _to_drop.append(ip)
                  except Exception:
                      expired.append(ip)
                      _to_drop.append(ip)
              except Exception as _per_ip_err:
                  # Korrupter Eintrag (z.B. exotischer Typ in dict) → wegwerfen
                  # statt Run abbrechen. Logging gedrosselt: max 5 Beispiele.
                  if _corrupt_dropped < 5:
                      print(f"WARN: Korrupter seen_db-Eintrag {ip!r} beim Cleanup übersprungen: {_per_ip_err}", file=sys.stderr)
                  _corrupt_dropped += 1
                  _to_drop.append(ip)

          for ip in _to_drop:
              db.pop(ip, None)

          if _corrupt_dropped:
              print(f"Korrupte seen_db-Einträge entfernt: {_corrupt_dropped}")

          if protected_removed_runtime:
              print(f"Geschützte Einträge nach Feed-Ingest entfernt: {protected_removed_runtime}")
          print(f"Abgelaufen (>{EXPIRY_DAYS} Tage / Watchlist >{WATCHLIST_EXPIRY_DAYS} Tage): {len(expired)} IPs entfernt")
          if wl_cleanup_count:
              print(f"Whitelist-Bereinigung seen_db: {wl_cleanup_count} IPs entfernt")

          # ── community_reported_ips.txt Stale-Bereinigung ─────────────────
          # FIX STALE-COMMUNITY2: community_ip_report.yml nutzt append-only
          # (Race-Condition-Fix). Stale IPs werden hier bereinigt, nachdem
          # seen_db-Expiry gelaufen ist. Nur IPs behalten die noch in seen_db
          # sind – abgelaufene (30-Tage-Watchlist / 180-Tage-Ablauf) entfernen.
          _COMMUNITY_FILE = "community_reported_ips.txt"
          if os.path.exists(_COMMUNITY_FILE):
              with open(_COMMUNITY_FILE, encoding="utf-8") as _cf:
                  _community_all = {
                      l.strip() for l in _cf
                      if l.strip() and not l.startswith("#")
                  }
              _community_active = _community_all & set(db.keys())
              _community_stale = _community_all - _community_active
              if _community_stale:
                  _community_sorted = sorted(
                      _community_active,
                      key=lambda x: (tuple(int(o) for o in x.split('/')[0].split('.')), x),
                  )
                  # FIX ATOMIC: write_text_atomic statt open("w") – bei
                  # Runner-Kill bleibt die Datei komplett alt oder komplett neu.
                  _body = (
                      "# NETSHIELD Community Reported IPs\n"
                      f"# Aktualisiert: {now_stamp}\n"
                      "# Quelle: GitHub Issues (community-report Label)\n\n"
                  )
                  if _community_sorted:
                      _body += "\n".join(_community_sorted) + "\n"
                  write_text_atomic(_COMMUNITY_FILE, _body)
                  print(f"community_reported_ips.txt: {len(_community_stale)} veraltete IPs entfernt, "
                        f"{len(_community_active)} aktive behalten")

          # ── seen_db speichern ──────────────────────────────────────────────
          # FIX PERF-LAZYSORT: Sammelsortierung VOR dem JSON-Dump. In der
          # Update-Schleife oben werden `feeds` und `hq_feed_names` nur als
          # ungeordnete Listen befuellt – pro IP genau einmal. Hier wird
          # einmalig sortiert, bevor seen_db gespeichert wird. Iteriert NUR
          # ueber ip_feeds_today (die heute beruehrten IPs), nicht ueber alle
          # 4,8 M db-Eintraege – Eintraege die heute nicht angefasst wurden,
          # sind seit dem letzten Run noch sortiert. IPs aus ip_feeds_today,
          # die durch den Cleanup-Pass entfernt wurden, werden via `if ip in
          # db` uebersprungen. Byte-Stabilitaet des seen_db_backup.json.gz
          # ist damit aequivalent zum vorherigen per-IP-sorted()-Verhalten.
          for ip in ip_feeds_today:
              entry = db.get(ip)
              if not isinstance(entry, dict):
                  continue
              _f = entry.get("feeds")
              if isinstance(_f, list):
                  entry["feeds"] = sorted(_f)
              _h = entry.get("hq_feed_names")
              if isinstance(_h, list):
                  entry["hq_feed_names"] = sorted(_h)

          # Atomar via write_json_atomic (tmp-Datei + fsync + os.replace).
          # Verhindert korrupte seen_db.json bei Runner-OOM/SIGKILL/Timeout.
          # Ohne Atomicity wuerde eine halb geschriebene Datei naechsten Run
          # als korrupt erkannt → db={} → Leerungsschutz → kein Update.
          write_json_atomic(DB_FILE, db, separators=(",", ":"))

          # ── Stufe 1: combined_threat_blacklist_ipv4.txt (alle DB-IPs) ─────
          # FIX Bug6: Numerische IP-Sortierung (1.2.3.4 vor 10.0.0.1),
          # konsistent mit active_blacklist und allen anderen Ausgabedateien.
          # Zusätzlicher Guard: Whitelist-/FP-Treffer dürfen auch als Altlasten
          # aus früheren seen_db-Ständen nie mehr in die Combined-Ausgabe.
          # FIX PERF-SORT: _ip_sort_key statt Lambda mit string-split + 4×int.
          # Sortier-Key per socket.inet_aton (C) statt 4-Tupel pro IP – auf 4,8M
          # Eintraegen ~5-10x schneller. Order-equivalent zum alten Key.
          try:
              sorted_ips = sorted(
                  [ip for ip in db.keys()
                   if not _fast_is_protected(ip)
                   and not _fast_is_wl_or_fp(ip)],
                  key=_ip_sort_key
              )
          except Exception:
              sorted_ips = sorted(
                  [ip for ip in db.keys()
                   if not _fast_is_protected(ip)
                   and not _fast_is_wl_or_fp(ip)]
              )
          feed_stats.sort(key=lambda x: -x[1])

          # ── Leerungsschutz combined ───────────────────────────────────────
          # Verhindert das Überschreiben der Blacklist wenn seen_db leer/korrupt
          # ist oder alle Feeds gleichzeitig ausgefallen sind (z.B. Runner-Netzwerkausfall).
          # Schwelle: 1000 IPs – bei normalbetrieb sind stets >10.000 IPs vorhanden.
          MIN_COMBINED = 1000
          if len(sorted_ips) < MIN_COMBINED:
              msg = (f"Nur {len(sorted_ips)} IPs in combined (< {MIN_COMBINED}) – "
                     f"Leerungsschutz aktiv, combined_threat_blacklist_ipv4.txt wird NICHT überschrieben.")
              print(f"::error file=update_combined_blacklist.yml::{msg}")
              print(f"FEHLER: {msg}")
              sys.exit(1)

          # FIX ATOMIC: Direktes open("w") durch write_ip_list ersetzt –
          # verhindert halb geschriebene Datei bei Runner-OOM/SIGKILL.
          # Die Datei bleibt bei Crash entweder komplett alt oder komplett
          # neu – Garantie über os.replace() + fsync.
          #
          # FIX HARD-LIMIT: Groesse VOR dem Schreiben schaetzen. Wenn die
          # Hauptdatei >= HARD_LIMIT_MB waere, Truncate-Fallback: nur die
          # ersten N IPs schreiben, sodass die Datei unter dem Limit bleibt.
          # Die Vollstaendigkeit kommt in den Parts. Ohne diesen Check
          # wuerde git push hart fehlschlagen und der komplette Run
          # (inkl. korrekt erzeugter Parts) ginge verloren.
          HARD_LIMIT_MB = 100  # GitHub Push-Limit (auch unten verwendet)
          TRUNCATE_TARGET_MB = 95  # Sicherheitspuffer unter HARD_LIMIT_MB

          # Schaetzung: avg bytes/line aus einem STRATIFIZIERTEN Sample.
          # sorted_ips ist numerisch sortiert, niedrige Oktette (1.x.x.x) sind
          # kuerzer als hohe (223.x.x.x). Ein Sample vom Anfang unterschaetzt
          # daher systematisch um ~15-20%. Gleichverteiltes Sample via Stride
          # bringt den Fehler auf <0.1%.
          _step = max(1, len(sorted_ips) // 10_000)
          _sample = sorted_ips[::_step][:10_000] if sorted_ips else []
          _avg_line = (sum(len(s) + 1 for s in _sample) / len(_sample)) if _sample else 16
          _header_overhead = 512  # grosszuegig fuer 5 Kommentarzeilen
          # +2% Sicherheitsaufschlag fuer Sample-Restunschaerfe
          estimated_mb = (len(sorted_ips) * _avg_line * 1.02 + _header_overhead) / 1024 / 1024
          print(f"\nGeschaetzte Groesse combined (ungesplittet): {estimated_mb:.1f} MB")

          if estimated_mb >= HARD_LIMIT_MB:
              # Truncate: wie viele IPs passen in TRUNCATE_TARGET_MB?
              max_ips = int((TRUNCATE_TARGET_MB * 1024 * 1024 - _header_overhead) / _avg_line)
              max_ips = max(1000, min(max_ips, len(sorted_ips)))
              truncated_ips = sorted_ips[:max_ips]
              dropped = len(sorted_ips) - max_ips
              trunc_msg = (
                  f"Hauptdatei wuerde {estimated_mb:.1f} MB (>= {HARD_LIMIT_MB} MB "
                  f"GitHub-Limit) – TRUNCATE auf {max_ips:,} IPs (~{TRUNCATE_TARGET_MB} MB). "
                  f"{dropped:,} IPs ausschliesslich in Parts. Consumer auf Parts umstellen!"
              )
              print(f"::warning file=update_combined_blacklist.yml::{trunc_msg}")
              print(f"WARNUNG: {trunc_msg}")
              write_ip_list(
                  "combined_threat_blacklist_ipv4.txt",
                  truncated_ips,
                  header_lines=[
                      "NETSHIELD Combined Threat Blacklist (IPv4) – Stufe 1 [TRUNCATED]",
                      f"Aktualisiert: {now_stamp}",
                      f"Feeds: {len(SOURCES) + len(LOCAL_FEEDS)}",
                      f"Eintraege in dieser Datei: {max_ips} (von {len(sorted_ips)} gesamt)",
                      f"WICHTIG: {dropped} IPs NICHT in dieser Datei enthalten "
                      f"(GitHub-Hard-Limit 100 MB).",
                      "Fuer vollstaendigen Schutz: combined_threat_blacklist_ipv4_part*.txt verwenden.",
                      f"Abgelaufen entfernt: {len(expired)}",
                  ],
              )
          else:
              write_ip_list(
                  "combined_threat_blacklist_ipv4.txt",
                  sorted_ips,
                  header_lines=[
                      "NETSHIELD Combined Threat Blacklist (IPv4) – Stufe 1",
                      f"Aktualisiert: {now_stamp}",
                      f"Feeds: {len(SOURCES) + len(LOCAL_FEEDS)}",
                      f"Eintraege: {len(sorted_ips)}",
                      f"Abgelaufen entfernt: {len(expired)}",
                  ],
              )

          # ── Split-Logik fuer grosse Dateien ───────────────────────────
          # GitHub lehnt Push bei Dateien > 100 MB ab. Sobald combined
          # ueber SPLIT_THRESHOLD waechst, zusaetzlich in Parts von ca.
          # PART_TARGET_MB schreiben. Die Haupt-Datei bleibt als Legacy
          # erhalten solange sie unter 100 MB ist (sonst wuerde ein
          # etablierter Download-Link brechen).
          import glob
          SPLIT_THRESHOLD_MB = 90     # ab hier Parts erzeugen
          PART_TARGET_MB     = 40     # Groesse pro Part
          # HARD_LIMIT_MB bereits oben definiert (Truncate-Fallback)

          combined_size_mb = os.path.getsize("combined_threat_blacklist_ipv4.txt") / 1024 / 1024
          print(f"\ncombined_threat_blacklist_ipv4.txt (tatsaechlich): {combined_size_mb:.1f} MB")

          # Existierende Parts sammeln (zum Aufraeumen wenn nicht mehr noetig)
          existing_parts = sorted(glob.glob("combined_threat_blacklist_ipv4_part*.txt"))

          # WICHTIG: Split-Entscheidung auf Basis der VOLLSTAENDIGEN Liste
          # (estimated_mb), nicht der evtl. truncatierten Hauptdatei. Bei Truncate
          # muessen die Parts zwingend existieren, weil sie die einzige
          # vollstaendige Quelle sind.
          if estimated_mb >= SPLIT_THRESHOLD_MB:
              # Ziel: ~PART_TARGET_MB pro Part. Wir splitten nach Zeilen-Anzahl
              # proportional zur Gesamtgroesse (deterministisch auf der bereits
              # sortierten Liste – die Reihenfolge bleibt stabil).
              num_parts = max(2, int((estimated_mb / PART_TARGET_MB) + 0.5))
              chunk_size = (len(sorted_ips) + num_parts - 1) // num_parts

              print(f"  -> Split aktiv: {num_parts} Parts a ~{PART_TARGET_MB} MB "
                    f"({chunk_size:,} IPs/Part)")

              new_parts = []
              for idx in range(num_parts):
                  start = idx * chunk_size
                  end   = min(start + chunk_size, len(sorted_ips))
                  if start >= len(sorted_ips):
                      break
                  part_name = f"combined_threat_blacklist_ipv4_part{idx+1}.txt"
                  write_ip_list(
                      part_name,
                      sorted_ips[start:end],
                      header_lines=[
                          f"NETSHIELD Combined Threat Blacklist – Part {idx+1}/{num_parts}",
                          f"Aktualisiert: {now_stamp}",
                          f"IP-Bereich: {sorted_ips[start]} bis {sorted_ips[end-1]}",
                          f"Eintraege: {end - start}",
                          "Siehe README fuer Nutzung mit allen Parts.",
                      ],
                  )
                  new_parts.append(part_name)
                  print(f"  {part_name}: {end - start:,} IPs")

              # Alte Parts entfernen, die nicht mehr erzeugt wurden
              # (z.B. Liste schrumpft von 5 auf 3 Parts)
              for old in existing_parts:
                  if old not in new_parts:
                      try:
                          os.unlink(old)
                          print(f"  Alten Part entfernt: {old}")
                      except OSError:
                          pass

              # Info-Ausgabe (Truncate-Warnung wurde bereits oben geloggt)
              if estimated_mb < HARD_LIMIT_MB:
                  msg = (f"Vollliste waere {estimated_mb:.1f} MB "
                         f"(>= {SPLIT_THRESHOLD_MB} MB). Parts erzeugt als Reserve.")
                  print(f"::warning file=update_combined_blacklist.yml::{msg}")
                  print(f"WARNUNG: {msg}")
          else:
              # Unter Schwelle: Eventuell vorhandene alte Parts aufraeumen
              for old in existing_parts:
                  try:
                      os.unlink(old)
                      print(f"  Alten Part entfernt (unter Schwelle): {old}")
                  except OSError:
                      pass

          # ── Stufe 2: active_blacklist_ipv4.txt (30 Tage + Confidence >= 65) ──
          # Kriterien kombiniert:
          #   1. last_seen <= 30 Tage  (nur HQ-Feeds setzen last → echte Aktualität)
          #   2. Confidence-Score >= 65 (gleiche Schwelle wie active_blacklist-Header)
          # Ziel: kleine, qualitativ hochwertige OPNsense-Liste ohne statischen Ballast.
          cutoff_30 = now - timedelta(days=30)
          # FIX PERF-ACTIVE: ISO-Datum als String für lexikographischen Compare
          # statt strptime pro IP. "YYYY-MM-DD" ist string-vergleichbar – das
          # erspart strptime() für die ~1 Mio IPs die das 30-Tage-Window nicht
          # schaffen (etwa 22% der DB).
          cutoff_30_str = cutoff_30.strftime("%Y-%m-%d")
          active_ips = []
          active_skipped_score = 0   # besteht Recency, aber Score < 65
          active_skipped_old   = 0   # zu alt (last_dt > 30 Tage)
          active_skipped_corrupt = 0

          # FIX PERF-ACTIVE: Hot-Loop-Optimierung – Funktions-Lookups in lokale
          # Variablen binden. Erspart pro Iteration den Modul-/Builtin-Lookup
          # (~50-100ns × 4,8M = 0,3-0,5s). Marginal aber kostenlos.
          _calc_conf = calculate_confidence
          # FIX PERF-ACTIVE2: date.fromisoformat statt datetime.strptime.
          # fromisoformat ist eine pure C-Funktion ohne Format-String-Parser
          # und ~3-5x schneller als strptime("%Y-%m-%d"). Außerdem entfaellt
          # das replace(tzinfo=...), weil fuer Tages-Differenzen reine date-
          # Objekte ausreichen (UTC-Naivitaet ist hier irrelevant: alle
          # Eintraege sind YYYY-MM-DD ohne Zeitanteil).
          from datetime import date as _date
          _fromiso = _date.fromisoformat
          _now_date = now.date()

          for ip, data in db.items():
              try:
                  if not isinstance(data, dict):
                      active_skipped_corrupt += 1
                      continue
                  # Defense-in-Depth: nach merged Cleanup-Pass sollten hier keine
                  # protected/wl_or_fp IPs mehr sein. Bisect-Checks sind O(log K)
                  # und kosten zusammen ~1µs pro IP – günstig genug zum Behalten.
                  if _fast_is_protected(ip):
                      continue
                  if _fast_is_wl_or_fp(ip):
                      continue
                  # FIX PERF-ACTIVE: Sentinel-Check + lexikographischer
                  # Datums-Compare BEVOR strptime. Watchlist-IPs (last=Sentinel)
                  # und zu alte IPs werden ohne Parse aussortiert.
                  last_str = data.get("last", "")
                  if not isinstance(last_str, str) or last_str == "2000-01-01":
                      continue
                  if last_str < cutoff_30_str:
                      active_skipped_old += 1
                      continue

                  # FIX PERF-ACTIVE: first_seen erst hier parsen – nicht vorher.
                  # Bei IPs die durch den lex-Compare oben rausfallen wurden
                  # vorher 2 strptime-Aufrufe gemacht.
                  first_seen = safe_get_date(data, "first", last_str)
                  try:
                      last_dt  = _fromiso(last_str)
                      first_dt = _fromiso(first_seen)
                  except (ValueError, TypeError):
                      active_skipped_corrupt += 1
                      continue

                  is_hq       = data.get("hq", False)
                  feed_count  = len(data.get("feeds", []))
                  today_count = data.get("today_count", 0)
                  days_seen   = data.get("days_seen", 1)
                  days_since_last = (_now_date - last_dt).days
                  # FIX BUG-2: first="2000-01-01" ist ein Sentinel, kein echtes Datum.
                  # Ohne Neutralisierung würde days_known ≈ 9600 den vollen Alter-Bonus
                  # +10 triggern. Für active_blacklist (Score ≥65) ist das besonders
                  # kritisch: eine HQ-IP mit Sentinel-first könnte so 40+10+20=70
                  # erreichen und legitime Traffic-Pfade blockieren.
                  # SYNC: identisch zu update_confidence_blacklist.yml.
                  if first_seen == "2000-01-01":
                      days_known = 0
                  else:
                      days_known = (_now_date - first_dt).days + 1

                  # FIX DRY: Inline-Scoring entfernt, rufe stattdessen die
                  # zentrale Funktion aus netshield_common auf. Verhindert
                  # Drift mit update_confidence_blacklist.yml und spart
                  # ~30 Zeilen. Die Funktion ist crash-sicher gegen
                  # korrupte seen_db-Werte (Typ-Koerzierung intern).
                  conf = _calc_conf(
                      is_hq=is_hq,
                      today_count=today_count,
                      feed_count=feed_count,
                      days_since_last=days_since_last,
                      days_seen=days_seen,
                      days_known=days_known,
                  )

                  if conf >= 65:
                      active_ips.append(ip)
                  else:
                      active_skipped_score += 1
              except Exception as _corrupt:
                  if active_skipped_corrupt < 5:
                      print(f"WARN: Korrupter seen_db-Eintrag {ip}: {_corrupt}", file=sys.stderr)
                  active_skipped_corrupt += 1
                  continue

          if active_skipped_corrupt:
              print(f"Active-Blacklist: {active_skipped_corrupt} korrupte Einträge übersprungen")

          try:
              # FIX PERF-SORT: Gleicher schneller Key wie bei combined.
              active_ips.sort(key=_ip_sort_key)
          except Exception:
              active_ips.sort()

          # ── Leerungsschutz active ─────────────────────────────────────────
          # active_blacklist kann bei einem frischen Repo (noch keine HQ-Daten) oder
          # nach einem Cache-Miss leer sein – in dem Fall die bestehende Datei behalten.
          # Kein sys.exit(1): combined wurde bereits geschrieben, nur active überspringen.
          MIN_ACTIVE = 100
          if len(active_ips) < MIN_ACTIVE:
              msg = (f"Nur {len(active_ips)} aktive IPs (< {MIN_ACTIVE}) – "
                     f"active_blacklist_ipv4.txt wird NICHT überschrieben (behalte vorherigen Stand).")
              print(f"::warning file=update_combined_blacklist.yml::{msg}")
              print(f"WARNUNG: {msg}")
          else:
              # FIX ATOMIC: write_ip_list statt open("w") – Crash-sicher.
              write_ip_list(
                  "active_blacklist_ipv4.txt",
                  active_ips,
                  header_lines=[
                      "NETSHIELD Active Blacklist (IPv4) – Stufe 2",
                      f"Aktualisiert: {now_stamp}",
                      "Kriterien: last_seen <= 30 Tage UND Confidence-Score >= 65/100",
                      f"Eintraege: {len(active_ips)}",
                      f"Herausgefiltert (zu alt >30T): {active_skipped_old} | (Score <65): {active_skipped_score}",
                  ],
              )

          # ── Report ─────────────────────────────────────────────────────────
          _report_parts = ["# Combined Threat Blacklist Report\n\n"]
          _report_parts.append(f"- Aktualisiert: **{now_stamp}**\n")
          _report_parts.append(f"- Feeds gesamt: **{len(SOURCES) + len(LOCAL_FEEDS)}** (davon {len(LOCAL_FEEDS)} lokale Sub-Workflow-Feeds)\n")
          _report_parts.append(f"- Stufe 1 (combined): **{len(sorted_ips)}** IPs\n")
          _report_parts.append(f"- Stufe 2 (active, 30T + Conf≥65): **{len(active_ips)}** IPs | herausgefiltert: {active_skipped_old} zu alt, {active_skipped_score} Score<65\n")
          _report_parts.append(f"- Abgelaufen & entfernt: **{len(expired)}**\n\n")
          _report_parts.append("## Feed-Statistik\n\n| Feed | IPs |\n|---|---:|\n")
          for name, count in feed_stats:
              hq_mark = " ⭐" if name in HIGH_QUALITY else ""
              _report_parts.append(f"| `{name}`{hq_mark} | {count} |\n")
          write_text_atomic("combined_threat_blacklist_report.md", "".join(_report_parts))

          print(f"\nFertig! combined: {len(sorted_ips)} IPs | active: {len(active_ips)} IPs | zu alt: {active_skipped_old} | Score<65: {active_skipped_score} | Feeds: {len(SOURCES) + len(LOCAL_FEEDS)}")
          EOF

      - name: Save seen_db Cache
        # FIX BUG-AL1: if: always() ergänzt. Ohne dieses Guard wurde der Cache-Save
        # übersprungen wenn der Haupt-Python-Step mit einer unbehandelten Exception
        # crashte (z.B. während json.dump bei Netzwerkproblem). Folge: Downstream-
        # Workflows (Confidence, Score Decay, FP-Checker) griffen auf veralteten Cache
        # zurück – Confidence-Blacklist berechnete dann Scores auf Basis einer
        # möglicherweise Stunden alten seen_db.
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: seen_db.json
          # v2: Kein statischer "latest"-Key mehr. Restore erfolgt über Prefix
          # und bekommt dadurch immer den neuesten verfügbaren Cache.
          key: netshield-seen-db-v2-${{ github.run_id }}


      - name: Backup seen_db to Repo (komprimiert)
        if: always()
        run: |
          if [ -f seen_db.json ]; then
            # Komprimiertes Backup (nur wenn seen_db > 1MB, also nicht leer/korrupt)
            SIZE=$(stat -c%s seen_db.json 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 1048576 ]; then
              gzip -c seen_db.json > seen_db_backup.json.gz
              echo "seen_db Backup erstellt: $(du -h seen_db_backup.json.gz | cut -f1)"
            else
              echo "seen_db zu klein ($SIZE Bytes) – kein Backup (möglicherweise korrupt)"
            fi
          fi

      - name: Commit and Push
        # FIX BUG-AL1 (2/2): if: always() ergänzt. Ohne diesen Guard wurden bei einem
        # Python-Crash weder combined_threat_blacklist_ipv4.txt noch active_blacklist noch
        # seen_db_meta.json committet. Das Repo zeigte dann veraltete Stände obwohl der
        # Workflow technisch gelaufen war. Auch Fehler-Teilstände (z.B. Report ohne
        # Blacklist-Update) sollen sichtbar ins Repo committed werden.
        if: always()
        run: |
          python3 - << 'PYEOF'
          import sys as _sys; _sys.path.insert(0, "scripts")
          from netshield_common import (
              load_whitelist, load_fp_set, is_in_fp_set,
              is_valid_public_ipv4, is_valid_public_cidr,
              is_protected_entry, is_whitelisted,
              parse_entries, calculate_confidence,
              safe_get_date, parse_date, sort_ips, write_ip_list,
              write_json_atomic,
              fetch_url, check_local_feed_age,
              IPV4_RE, CIDR_RE, TIMESTAMP_RE,
          )
          import json, os
          from datetime import datetime, timezone
          now_str = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          meta = {"note": "seen_db.json nur im GitHub Actions Cache (zu gross fuer Repo)", "updated": now_str}
          if os.path.exists("seen_db.json"):
              try:
                  with open("seen_db.json") as f:
                      db = json.load(f)
                  meta["total_ips"] = len(db)
                  meta["size_mb"] = round(os.path.getsize("seen_db.json") / 1024 / 1024, 1)
                  print(f"seen_db: {len(db)} IPs, {meta['size_mb']} MB")
              except Exception as e:
                  meta["error"] = f"seen_db.json nicht lesbar: {e}"
                  meta["size_mb"] = round(os.path.getsize("seen_db.json") / 1024 / 1024, 1)
                  print(f"WARNUNG: seen_db.json korrupt oder nicht lesbar: {e}")
          write_json_atomic("seen_db_meta.json", meta, indent=2)
          PYEOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add combined_threat_blacklist_ipv4.txt active_blacklist_ipv4.txt combined_threat_blacklist_report.md seen_db_meta.json abuseipdb_api_blacklist.txt community_reported_ips.txt seen_db_backup.json.gz 2>/dev/null || true
          # Split-Parts (falls erzeugt) und geloeschte Parts auch stagen
          git add combined_threat_blacklist_ipv4_part*.txt 2>/dev/null || true
          git add -u combined_threat_blacklist_ipv4_part*.txt 2>/dev/null || true

          # ── Pre-Flight-Guard: Keine gestagete Datei >= 100 MB ──────────
          # GitHub lehnt Push bei Dateien > 100 MB hart ab. Falls die
          # Groessen-Schaetzung in der Split-Logik danebenlag (z.B. weil
          # avg-line-length vom Sample abweicht), faengt dieser Check es
          # ab BEVOR der Commit passiert. Besser hier hart fehlschlagen
          # als 5 Push-Versuche mit Rebase-Loop und Datenverlust.
          # WICHTIG: Nur STAGED files pruefen – nicht das Working-Dir.
          # seen_db.json (~1 GB) lebt im Working-Dir (gitignored, nur im
          # Actions-Cache), darf den Guard also nicht triggern.
          oversized=""
          while IFS= read -r f; do
              [ -z "$f" ] && continue
              [ ! -f "$f" ] && continue
              sz_bytes=$(stat -c%s "$f" 2>/dev/null || echo 0)
              if [ "$sz_bytes" -ge 104857600 ]; then
                  sz=$(du -h "$f" 2>/dev/null | cut -f1)
                  oversized="${oversized}  ${f} (${sz})"$'\n'
              fi
          done < <(git diff --staged --name-only --diff-filter=ACMR)
          if [ -n "$oversized" ]; then
              echo "::error file=update_combined_blacklist.yml::Pre-Flight-Guard: Gestagete Datei(en) >= 100 MB gefunden – Push waere unmoeglich:"
              printf '%s' "$oversized"
              echo "FEHLER: Abbruch vor git commit – nichts wird committet."
              git reset >/dev/null 2>&1 || true
              exit 1
          fi
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "Update Combined Blacklist: $(date -u '+%Y-%m-%d %H:%M') UTC"
            # FIX BUG-2: Pre-Loop-Stash entfernt. Vorher gab es zwei stashes
            # (vor und in der Schleife). Der Pre-Loop-Stash machte den In-Loop-
            # Stash auf der ersten Iteration zum No-Op und wurde selbst nie
            # gepoppt → harmlos auf ephemeralem Runner, aber unbalanciert
            # (mehr stash als pop) und verwirrend. Der In-Loop-Stash unten
            # reicht: er klammert jeden rebase-Versuch korrekt.
            for attempt in 1 2 3 4 5; do
              echo "Push-Versuch $attempt..."
              git fetch origin ${GITHUB_REF_NAME}
              git stash --include-untracked 2>/dev/null || true
              if git rebase -X theirs origin/${GITHUB_REF_NAME}; then
                git stash pop 2>/dev/null || true
                if git push origin HEAD:${GITHUB_REF_NAME}; then
                  echo "Push erfolgreich (Versuch $attempt)"
                  exit 0
                fi
              else
                git stash pop 2>/dev/null || true
                git checkout --theirs combined_threat_blacklist_ipv4.txt active_blacklist_ipv4.txt \
                  combined_threat_blacklist_report.md \
                  seen_db_meta.json abuseipdb_api_blacklist.txt \
                  community_reported_ips.txt seen_db_backup.json.gz 2>/dev/null || true
                # Parts ggf. auch per theirs mergen
                for _p in combined_threat_blacklist_ipv4_part*.txt; do
                  [ -f "$_p" ] && git checkout --theirs "$_p" 2>/dev/null || true
                done
                git add combined_threat_blacklist_ipv4.txt active_blacklist_ipv4.txt \
                  combined_threat_blacklist_report.md seen_db_meta.json \
                  abuseipdb_api_blacklist.txt community_reported_ips.txt seen_db_backup.json.gz 2>/dev/null || true
                git add combined_threat_blacklist_ipv4_part*.txt 2>/dev/null || true
                git add -u combined_threat_blacklist_ipv4_part*.txt 2>/dev/null || true
                GIT_EDITOR=true git rebase --continue 2>/dev/null || git rebase --skip
              fi
              sleep $((attempt * 3))
            done
            echo "FEHLER: Push nach 5 Versuchen fehlgeschlagen"
            exit 1
          fi
