name: Update Combined Threat Blacklist (IPv4)

on:
  schedule:
    - cron: '0 */6 * * *'   # alle 6 Stunden
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
