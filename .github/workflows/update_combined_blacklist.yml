name: Update Combined Blacklist

on:
  schedule:
    - cron: '0 */3 * * *'  # 8x täglich – alle 3 Stunden
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none


concurrency:
  group: netshield-seen-db-writers
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Restore seen_db Cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: seen_db.json
          key: netshield-seen-db-v2-${{ github.run_id }}
          restore-keys: |
            netshield-seen-db-v2-
            netshield-seen-db-community-
            netshield-seen-db-v1-
            netshield-seen-db-

      - name: Fetch AbuseIPDB Blacklist (API, Round-Robin)
        continue-on-error: true  # Rate-Limit (5 Req/Tag, Free-Plan) darf den Haupt-Build nicht blockieren
        env:
          ABUSEIPDB_KEY_1: ${{ secrets.ABUSEIPDB_API_KEY_1 }}
          ABUSEIPDB_KEY_2: ${{ secrets.ABUSEIPDB_API_KEY_2 }}
          ABUSEIPDB_KEY_3: ${{ secrets.ABUSEIPDB_API_KEY_3 }}
        run: |
          python3 << 'EOF'
          import sys as _sys; _sys.path.insert(0, "scripts")
          from netshield_common import (
              load_whitelist, load_fp_set, is_in_fp_set,
              is_valid_public_ipv4, is_valid_public_cidr,
              is_protected_entry, is_whitelisted,
              parse_entries, calculate_confidence,
              safe_get_date, parse_date, sort_ips, write_ip_list,
              fetch_url, check_local_feed_age,
              IPV4_RE, CIDR_RE, TIMESTAMP_RE,
          )

          # Init: Whitelist + FP-Set laden
          load_whitelist()
          load_fp_set()

          import json, os, urllib.request, urllib.error
          from datetime import datetime, timezone

          now_str = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          # ── Fallback-Logik: Free-Plan erlaubt 1 Request/Tag pro Key ─────────────
          # Key 1 wird zuerst versucht. Schlägt er fehl (429 Rate-Limit oder
          # sonstiger Fehler), wird Key 2 versucht, dann Key 3.
          # Da alle Keys dieselbe Liste zurückgeben (Free-Plan, Top-10.000
          # nach Score ≥ 50), reicht ein erfolgreicher Request pro Tag.
          # .strip() entfernt versehentliche Newlines/Leerzeichen aus dem Secret
          KEYS = [
              os.environ.get("ABUSEIPDB_KEY_1", "").strip(),
              os.environ.get("ABUSEIPDB_KEY_2", "").strip(),
              os.environ.get("ABUSEIPDB_KEY_3", "").strip(),
          ]
          MIN_SCORE = 50
          LIMIT     = 10000

          all_ips = set()
          stats   = []

          for idx, key in enumerate(KEYS, 1):
              if not key:
                  print(f"  Key {idx}: nicht gesetzt – übersprungen")
                  stats.append((idx, 0, "KEY_MISSING"))
                  continue

              url = (
                  f"https://api.abuseipdb.com/api/v2/blacklist"
                  f"?confidenceMinimum={MIN_SCORE}&limit={LIMIT}&plaintext=1"
              )
              req = urllib.request.Request(url, headers={
                  "Key":    key,
                  "Accept": "text/plain",
              })
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      status = r.status
                      body   = r.read().decode("utf-8", errors="ignore")

                  ips = {line.strip() for line in body.splitlines()
                         if line.strip() and not line.startswith("#")
                         and ":" not in line}   # IPv6 ausschließen
                  all_ips.update(ips)
                  print(f"  Key {idx}: {len(ips)} IPs  [HTTP {status}] – Erfolg, stoppe hier")
                  stats.append((idx, len(ips), "OK"))
                  break   # ← ein erfolgreicher Request reicht, nächste Keys schonen

              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="ignore")[:200]
                  print(f"  Key {idx}: HTTP {e.code} – {body} → versuche nächsten Key")
                  stats.append((idx, 0, f"HTTP_{e.code}"))
              except Exception as e:
                  print(f"  Key {idx}: Fehler – {e} → versuche nächsten Key")
                  stats.append((idx, 0, "ERROR"))

          # ── Ergebnis speichern ────────────────────────────────────────────────
          OUT = "abuseipdb_api_blacklist.txt"
          sorted_ips = sorted(all_ips, key=lambda e: (tuple(int(x) for x in e.split('/')[0].split('.')), e))

          # ── Leerungsschutz für AbuseIPDB-Ausgabe ─────────────────────────
          # Rate-Limit (Free-Plan: 5 Req/Tag) → exit(0) statt exit(1), da
          # continue-on-error am Step den Build-Abbruch verhindert.
          # Die bestehende abuseipdb_api_blacklist.txt wird als lokaler Feed weiter gelesen.
          import sys
          MIN_ABUSEIPDB = 100
          if len(sorted_ips) < MIN_ABUSEIPDB:
              msg = (f"Nur {len(sorted_ips)} AbuseIPDB-IPs (<{MIN_ABUSEIPDB}) – "
                     f"Rate-Limit erschöpft, behalte bestehende {OUT}")
              print(f"::warning file=update_combined_blacklist.yml::{msg}")
              print(f"WARNUNG: {msg}")
              sys.exit(0)  # exit(0) = kein Fehler; continue-on-error am Step verhindert Build-Block

          # FIX ATOMIC: Direktes open("w") durch write_ip_list ersetzt –
          # garantiert dass die Datei bei Crash/Kill/OOM entweder komplett
          # alt oder komplett neu ist, nie halb geschrieben.
          header_stats = [f"Key {idx}: {count} IPs [{status}]" for idx, count, status in stats]
          write_ip_list(
              OUT,
              sorted_ips,
              header_lines=[
                  "AbuseIPDB API Blacklist – NETSHIELD",
                  f"Aktualisiert: {now_str}",
                  "Quellen: 3 API-Keys (Round-Robin)",
                  f"Eintraege: {len(sorted_ips)}",
                  *header_stats,
              ],
          )

          print(f"\nAbuseIPDB gesamt: {len(sorted_ips)} einzigartige IPs → {OUT}")
          EOF

      - name: Fetch, discover, learn and build IPv4 lists
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python3 << 'EOF'
          import sys as _sys; _sys.path.insert(0, "scripts")
          from netshield_common import (
              load_whitelist, load_fp_set, is_in_fp_set,
              is_valid_public_ipv4, is_valid_public_cidr,
              is_protected_entry, is_whitelisted,
              parse_entries, calculate_confidence,
              safe_get_date, parse_date, sort_ips, write_ip_list,
              write_json_atomic, write_text_atomic,
              fetch_url, check_local_feed_age,
              IPV4_RE, CIDR_RE, TIMESTAMP_RE,
          )
          import ipaddress, json, os, re, sys, urllib.request
          from datetime import datetime, timezone, timedelta
          from concurrent.futures import ThreadPoolExecutor, as_completed, TimeoutError
          # FIX PERF-SORT: socket.inet_aton + struct.unpack ist die C-Implementierung
          # fuer IP→int und ~10x schneller als int(ipaddress.IPv4Address(s)). Wird im
          # Sort-Key fuer combined_threat_blacklist und active_blacklist verwendet.
          import socket as _socket, struct as _struct

          def _ip_sort_key(e):
              """O(1) Sort-Key per inet_aton. CIDRs (selten) werden anhand ihrer
              Netz-Adresse sortiert – genau wie der alte tuple()-Key. Bei
              Parse-Fehler (sollte nach Cleanup-Pass nicht mehr vorkommen)
              landet die IP am Ende mit stabilem Tie-Break ueber den String.
              Returnt (int, str) – ordnungsequivalent zum alten
              ((int,int,int,int), str)-Key (Big-Endian inet_aton ↔ dot-notation).

              FIX CRASH-GUARD: faengt zusaetzlich AttributeError (None/bytes/int
              statt str) und alle weiteren Exceptions ab. Eine einzelne kaputte
              dict-Key wuerde sonst sorted() crashen und den ganzen Run kippen.
              """
              try:
                  return (_struct.unpack('!I', _socket.inet_aton(e.split('/')[0]))[0], e)
              except (OSError, AttributeError, TypeError, ValueError):
                  # Nicht-IP / None / bytes → ans Ende, stabil ueber repr()
                  return (0xFFFFFFFF, repr(e))

          # FIX BUG-WL1: load_whitelist() + load_fp_set() fehlten in diesem Step.
          # Jeder run:-Step ist ein eigener Prozess – der Aufruf im AbuseIPDB-Step
          # (Zeile 65) hat hier keine Wirkung. Ohne diesen Aufruf waren
          # _whitelist_networks und _protected_networks in netshield_common leer,
          # is_whitelisted() gab immer False zurück → Whitelist-Leak in beiden Ausgabedateien.
          load_whitelist()
          load_fp_set()

          now        = datetime.now(timezone.utc)
          now_day    = now.strftime("%Y-%m-%d")
          now_stamp  = now.strftime("%Y-%m-%d %H:%M UTC")
          EXPIRY_DAYS = 180
          DB_FILE     = "seen_db.json"
          READ_LIMIT  = 25 * 1024 * 1024   # 25 MB pro Feed

          # IPV4_RE wird aus netshield_common importiert; lokale Re-Definition
          # entfernt (war ungenutzt, hätte aber bei Wiederverwendung den
          # Versions-String-Filter umgangen).

          # DNS_WHITELIST entfernt – wird über whitelist.json geladen (via netshield_common)

          # ── Whitelist: IPs/CIDRs die NIE auf die Blacklist kommen ─────────
          # Spiegelidentisch mit false_positive_checker.yml – hier gefiltert
          # beim seen_db-Eintrag, damit sie gar nicht erst aufgenommen werden.
          # Änderungen immer in BEIDEN Dateien synchron halten.
          # ── Whitelist: IPs/CIDRs die NIE auf die Blacklist kommen ─────────
          # Single Source of Truth: whitelist.json (synchron mit false_positive_checker)
          try:
              with open(".github/workflows/whitelist.json", encoding="utf-8") as _wl_f:
                  WHITELIST_ENTRIES = json.load(_wl_f)["entries"]
              if len(WHITELIST_ENTRIES) < 50:
                  _msg = f"whitelist.json hat nur {len(WHITELIST_ENTRIES)} Einträge (<50) – möglicherweise korrupt"
                  print(f"::error file=update_combined_blacklist.yml::{_msg}")
                  print(f"FEHLER: {_msg}")
                  sys.exit(1)
          except Exception as _wl_err:
              _msg = f"whitelist.json nicht ladbar: {_wl_err} – Workflow abgebrochen (Schutz vor ungefilterter Blacklist)"
              print(f"::error file=update_combined_blacklist.yml::{_msg}")
              print(f"FEHLER: {_msg}")
              sys.exit(1)

          _whitelist_networks = []
          for _entry in list(WHITELIST_ENTRIES):
              try:
                  _whitelist_networks.append(ipaddress.ip_network(_entry, strict=False))
              except Exception as _suppressed:
                  print(f"WARN: suppressed Exception: {_suppressed}", file=sys.stderr)

          # is_whitelisted() → importiert aus netshield_common
          # PROTECTED_CIDRS entfernt – wird über whitelist.json + RFC1918 geladen (via netshield_common)
          # FIX W-COMBINED-1: _protected_networks aus netshield_common uebernehmen
          # statt leere lokale Liste anzulegen. Der frühere Dead-Loop
          # (`for _entry in []:`) hat die Variable als leer belassen; der
          # Binary-Search-Index in _all_protected_nets (Zeile ~634) bekam dadurch
          # keine RFC1918-/Reserved-/CGNAT-/Multicast-/Linklocal-Ranges, und
          # _fast_is_protected war nicht-aequivalent zu is_protected_entry.
          # Konsequenz: der seen_db-Cleanup-Pass (Zeile ~686/1030) konnte
          # RFC1918-IPs aus einem migrierten/manuell editierten Cache nicht
          # mehr abraeumen.
          import netshield_common as _nc
          _protected_networks = list(_nc._protected_networks)

          # is_protected_entry() → importiert aus netshield_common
          HIGH_QUALITY = {
              "cinsscore", "cinsarmy", "greensnow", "feodo_aggressive", "feodo_recommended",
              "threatfox_ioc", "binary_defense", "crowdsec_ssh",
              "danger_bruteforce", "threatview_high_conf", "firehol_cybercrime",
              "firehol_anonymous", "dshield", "cloudzy",
              "urlhaus_ips", "firehol_level1", "firehol_level2", "firehol_level3",
              "firehol_webclient", "firehol_webserver", "firehol_abusers_1d",
              "et_block", "et_compromised", "spamhaus_drop",
              "blocklist_de_all", "blocklist_de_export", "blocklist_de_strongips",
              "blocklist_de_ssh", "c2_iplist",
              "ipsum_level5", "ipsum_level7", "abuseipdb_s100_30d", "abuseipdb_s100_7d",
              "abuseipdb_score100", "turris_greylist",
              # FIX BUG-DP1: DataPlane-Feeds hatten hq=True in SOURCES, fehlten aber
              # in HIGH_QUALITY. Effekt: ip_in_hq wurde nie befüllt → strongly_confirmed_today
              # blieb False → das "last"-Feld wurde nie aktualisiert → IPs alterten still
              # nach 180 Tagen aus, obwohl DataPlane sie täglich frisch liefert.
              # Alle DataPlane-HQ-Feeds hier ergänzt; smtpgreet und ntpmode3 bleiben
              # bewusst non-HQ (enthalten auch harmlose Scanner/Surveyor- bzw. legitime
              # NTP-Client-IPs). Bei jedem neuen DataPlane-Feed mit hq=True in SOURCES
              # MUSS der Eintrag auch hier aufgenommen UND in HQ_FEED_FAMILIES als
              # "dataplane" markiert werden – sonst BUG-DP1.
              "dataplane_sshclient", "dataplane_sshpwauth", "dataplane_vncrfb",
              "dataplane_telnetlogin", "dataplane_dnsrd", "dataplane_smtpdata",
              "dataplane_dnsrdany", "dataplane_dnsversion",
              # FIX DP-EXTEND: 7 neue HQ-Feeds (dnstcp, proto41, ntpmode6/7, sip*)
              "dataplane_dnstcp", "dataplane_proto41",
              "dataplane_ntpmode6", "dataplane_ntpmode7",
              "dataplane_sipinvitation", "dataplane_sipquery", "dataplane_sipregistration",
              # GreedyBear (Honeynet Project) – HQ=True in SOURCES, muss hier
              # ebenfalls registriert sein, sonst läuft BUG-DP1-Szenario erneut:
              # strongly_confirmed_today bliebe False → IPs würden still ausaltern.
              "greedybear_recent",
              # blocklist_net_ua (BlockList.net.ua Projekt) – HQ=True in SOURCES,
              # wurde beim Hinzufügen in SOURCES versehentlich hier vergessen.
              # Der workflow_health_checker.yml (HIGH_QUALITY ↔ SOURCES Konsistenz)
              # meldet diesen Drift. Ohne diesen Eintrag werden ~90.000 IPs aus
              # diesem täglich aktualisierten Feed nicht als HQ erkannt → last-Feld
              # wird nie gesetzt → IPs altern nach 180 Tagen still aus.
              "blocklist_net_ua",
          }

          # ══════════════════════════════════════════════════════════════════
          # HQ_FEED_FAMILIES – Upstream-Gruppierung der HQ-Feeds
          #
          # FIX BUG-9: Aggregator-Feeds derselben Upstream-Quelle zählen für
          # strongly_confirmed_today (≥2 HQ-Feeds) als EINE Familie, nicht
          # als mehrere unabhängige Bestätigungen.
          #
          # Beispiel: firehol_level1.netset ist eine Teilmenge von level2,
          # level2 von level3. Eine IP in Level 1+2+3 zählte vorher als
          # 3 HQ-Bestätigungen (strongly_confirmed_today=True), obwohl es
          # technisch EIN Upstream ist (FireHOL Aggregator). Effekt: IPs
          # bleiben ewig in active, solange FireHOL sie in seinem Cache hat,
          # auch wenn der ursprüngliche Quell-Feed sie längst droppt.
          # Die Expiry-Uhr wird dadurch nie gestartet.
          #
          # Feeds ohne Eintrag in dieser Map zählen als eigene Familie
          # (ihr Feed-Name IST die Familie). dict.get(feed, feed).
          HQ_FEED_FAMILIES = {
              # FireHOL (iplists.firehol.org + github.com/firehol/blocklist-ipsets)
              "firehol_cybercrime":  "firehol",
              "firehol_anonymous":   "firehol",
              "firehol_level1":      "firehol",
              "firehol_level2":      "firehol",
              "firehol_level3":      "firehol",
              "firehol_webclient":   "firehol",
              "firehol_webserver":   "firehol",
              "firehol_abusers_1d":  "firehol",
              # DataPlane (dataplane.org) – einzelner Betreiber, alle Feeds
              # sind Sensor-Ausgaben derselben Infrastruktur.
              "dataplane_sshclient":    "dataplane",
              "dataplane_sshpwauth":    "dataplane",
              "dataplane_vncrfb":       "dataplane",
              "dataplane_telnetlogin":  "dataplane",
              "dataplane_dnsrd":        "dataplane",
              "dataplane_smtpdata":     "dataplane",
              "dataplane_dnsrdany":     "dataplane",
              "dataplane_dnsversion":   "dataplane",
              # FIX DP-EXTEND: 8 neue Feeds derselben Familie. smtpgreet und
              # ntpmode3 sind zwar non-HQ, müssen aber trotzdem hier stehen,
              # damit sie bei zufälligem Promote auf HQ in Zukunft korrekt
              # als Familie erkannt werden – schadet sonst nicht.
              "dataplane_smtpgreet":      "dataplane",
              "dataplane_dnstcp":         "dataplane",
              "dataplane_proto41":        "dataplane",
              "dataplane_ntpmode3":       "dataplane",
              "dataplane_ntpmode6":       "dataplane",
              "dataplane_ntpmode7":       "dataplane",
              "dataplane_sipinvitation":  "dataplane",
              "dataplane_sipquery":       "dataplane",
              "dataplane_sipregistration":"dataplane",
              # blocklist.de – all.txt ist Obermenge von ssh/export/strongips.
              "blocklist_de_all":        "blocklist_de",
              "blocklist_de_export":     "blocklist_de",
              "blocklist_de_strongips":  "blocklist_de",
              "blocklist_de_ssh":        "blocklist_de",
              # AbuseIPDB – alle s100-Feeds stammen aus derselben API-Datenquelle.
              "abuseipdb_s100_30d":  "abuseipdb",
              "abuseipdb_s100_7d":   "abuseipdb",
              "abuseipdb_score100":  "abuseipdb",
              # feodotracker.abuse.ch – aggressive/recommended sind zwei
              # Aggregations-Stufen derselben Datenbank.
              "feodo_aggressive":    "feodo",
              "feodo_recommended":   "feodo",
              # emergingthreats.net – et_block und et_compromised sind zwei
              # Ausgabe-Formate derselben Quelle.
              "et_block":         "et",
              "et_compromised":   "et",
              # ipsum (stamparm) – Level 5 und 7 sind dieselbe Datei mit
              # unterschiedlichen Schwellwerten.
              "ipsum_level5":  "ipsum",
              "ipsum_level7":  "ipsum",
              # cinsscore/cinsarmy – ci-badguys.txt ist dieselbe Datei,
              # aliased unter zwei Domains.
              "cinsscore":  "cins",
              "cinsarmy":   "cins",
          }

          def _hq_families_of(hq_feed_names):
              """Reduziert HQ-Feed-Namen auf ihre Upstream-Familien.
              Feeds ohne explizites Family-Mapping sind ihre eigene Familie."""
              return {HQ_FEED_FAMILIES.get(f, f) for f in hq_feed_names}

          # ══════════════════════════════════════════════════════════════════
          # SOURCES – erweitert um die vom User gelieferten Links
          # Format: "name": ("url", hq_bool)
          # ══════════════════════════════════════════════════════════════════
          SOURCES = {
              # ── Kern-Feeds ────────────────────────────────────────────────
              "cinsscore":                  ("https://cinsscore.com/list/ci-badguys.txt", True),
              "cinsarmy":                   ("https://cinsarmy.com/list/ci-badguys.txt", True),
              "greensnow":                  ("https://blocklist.greensnow.co/greensnow.txt", True),
              "feodo_aggressive":           ("https://feodotracker.abuse.ch/downloads/ipblocklist_aggressive.txt", True),
              "feodo_recommended":          ("https://feodotracker.abuse.ch/downloads/ipblocklist.txt", True),
              "threatfox_ioc":              ("https://raw.githubusercontent.com/elliotwutingfeng/ThreatFox-IOC-IPs/refs/heads/main/ips.txt", True),
              "l7_ddos":                    ("https://raw.githubusercontent.com/Tizian-Maxime-Weigt/L7-HTTP-DDoS-Flood-IP-Signature-IP-List/refs/heads/main/ddos-signatures.txt", False),  # Einzelperson-Repo, kein verifizierter Betreiber
              "binary_defense":             ("https://binarydefense.com/banlist.txt", True),
              "data_shield":                ("https://raw.githubusercontent.com/duggytuxy/Data-Shield_IPv4_Blocklist/refs/heads/main/prod_critical_data-shield_ipv4_blocklist.txt", False),  # Einzelperson-Repo, kein verifizierter Betreiber
              "interserver":                ("https://sigs.interserver.net/ip.txt", False),
              "crowdsec_ssh":               ("https://raw.githubusercontent.com/Y3ll0w/CrowdSec-CAPI-Decisions/refs/heads/main/ssh-bf.json.txt", True),
              "trcert_malware":             ("https://raw.githubusercontent.com/cenk/trcert-malware/refs/heads/main/trcert-ips.txt", False),  # Einzelperson-Repo, kein verifizierter Betreiber
              "danger_bruteforce":          ("https://danger.rulez.sk/projects/bruteforceblocker/blist.php", True),
              "threatview_high_conf":       ("https://threatview.io/Downloads/IP-High-Confidence-Feed.txt", True),
              "florent_banned":             ("https://raw.githubusercontent.com/florentvinai/bad-ips-on-my-vps/refs/heads/main/banned_ips.txt", False),
              "firehol_cybercrime":         ("https://raw.githubusercontent.com/firehol/blocklist-ipsets/refs/heads/master/cybercrime.ipset", True),
              "firehol_anonymous":          ("https://raw.githubusercontent.com/firehol/blocklist-ipsets/master/firehol_anonymous.netset", True),
              "dshield":                    ("https://www.dshield.org/block.txt", True),
              "cloudzy":                    ("https://raw.githubusercontent.com/CriticalPathSecurity/Public-Intelligence-Feeds/refs/heads/master/cloudzy.txt", True),
              "bbcan177":                   ("https://gist.githubusercontent.com/BBcan177/d7105c242f17f4498f81/raw", False),
              "kevinmarx":                  ("https://kevinmarx.org/malicious-ip-list.txt", False),
              # "honeypot_blocklist" entfernt: yuexuana521/honeypot-blocklist Repo gelöscht
              "edanwong":                   ("https://raw.githubusercontent.com/EdanWong/ip_list/refs/heads/main/my_ips.txt", False),
              "nixbear_malicious":          ("https://raw.githubusercontent.com/nixbear/malicious_ips/refs/heads/main/malicious_ips.txt", False),
              "ufukart_blacklist":          ("https://raw.githubusercontent.com/ufukart/Blacklist/main/blacklist.txt", False),
              "f3csystems":                 ("https://raw.githubusercontent.com/f3csystems/BlockList_IP/refs/heads/main/blacklist.txt", False),
              "fortigate_azure":            ("https://raw.githubusercontent.com/IT3ngineer/FortigateBlockList/refs/heads/main/AzureBlockListIPs.txt", False),
              "romainmarcoux_aa":           ("https://raw.githubusercontent.com/romainmarcoux/malicious-ip/main/full-300k-aa.txt", False),
              "romainmarcoux_ab":           ("https://raw.githubusercontent.com/romainmarcoux/malicious-ip/main/full-300k-ab.txt", False),
              # "romainmarcoux_ac" entfernt: full-300k-ac.txt existiert nicht mehr (HTTP 200, leerer Body)
              "4ip_high_security":          ("https://raw.githubusercontent.com/4IP-Solutions/threat-feeds/refs/heads/main/blocklist-incoming-ip-high-security.txt", False),
              "cyna_malicious":             ("https://raw.githubusercontent.com/cybersecurity-cyna/Malicious_IP/refs/heads/main/ip-list.txt", False),
              "black_mirror":               ("https://github.com/T145/black-mirror/releases/download/latest/BLOCK_IPV4.txt", False),
