name: Update Combined Blacklist

on:
  schedule:
    - cron: '0 */3 * * *'  # 8x täglich – alle 3 Stunden
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none


concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Restore seen_db Cache
        uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: seen_db.json
          key: netshield-seen-db-v2-${{ github.run_id }}
          restore-keys: |
            netshield-seen-db-v2-
            netshield-seen-db-community-
            netshield-seen-db-v1-
            netshield-seen-db-

      - name: Fetch AbuseIPDB Blacklist (API, Round-Robin)
        continue-on-error: true  # Rate-Limit (5 Req/Tag, Free-Plan) darf den Haupt-Build nicht blockieren
        env:
          ABUSEIPDB_KEY_1: ${{ secrets.ABUSEIPDB_API_KEY_1 }}
          ABUSEIPDB_KEY_2: ${{ secrets.ABUSEIPDB_API_KEY_2 }}
          ABUSEIPDB_KEY_3: ${{ secrets.ABUSEIPDB_API_KEY_3 }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request, urllib.error
          from datetime import datetime, timezone

          now_str = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          # ── Fallback-Logik: Free-Plan erlaubt 1 Request/Tag pro Key ─────────────
          # Key 1 wird zuerst versucht. Schlägt er fehl (429 Rate-Limit oder
          # sonstiger Fehler), wird Key 2 versucht, dann Key 3.
          # Da alle Keys dieselbe Liste zurückgeben (Free-Plan, Top-10.000
          # nach Score ≥ 50), reicht ein erfolgreicher Request pro Tag.
          # .strip() entfernt versehentliche Newlines/Leerzeichen aus dem Secret
          KEYS = [
              os.environ.get("ABUSEIPDB_KEY_1", "").strip(),
              os.environ.get("ABUSEIPDB_KEY_2", "").strip(),
              os.environ.get("ABUSEIPDB_KEY_3", "").strip(),
          ]
          MIN_SCORE = 50
          LIMIT     = 10000

          all_ips = set()
          stats   = []

          for idx, key in enumerate(KEYS, 1):
              if not key:
                  print(f"  Key {idx}: nicht gesetzt – übersprungen")
                  stats.append((idx, 0, "KEY_MISSING"))
                  continue

              url = (
                  f"https://api.abuseipdb.com/api/v2/blacklist"
                  f"?confidenceMinimum={MIN_SCORE}&limit={LIMIT}&plaintext=1"
              )
              req = urllib.request.Request(url, headers={
                  "Key":    key,
                  "Accept": "text/plain",
              })
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      status = r.status
                      body   = r.read().decode("utf-8", errors="ignore")

                  ips = {line.strip() for line in body.splitlines()
                         if line.strip() and not line.startswith("#")
                         and ":" not in line}   # IPv6 ausschließen
                  all_ips.update(ips)
                  print(f"  Key {idx}: {len(ips)} IPs  [HTTP {status}] – Erfolg, stoppe hier")
                  stats.append((idx, len(ips), "OK"))
                  break   # ← ein erfolgreicher Request reicht, nächste Keys schonen

              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="ignore")[:200]
                  print(f"  Key {idx}: HTTP {e.code} – {body} → versuche nächsten Key")
                  stats.append((idx, 0, f"HTTP_{e.code}"))
              except Exception as e:
                  print(f"  Key {idx}: Fehler – {e} → versuche nächsten Key")
                  stats.append((idx, 0, "ERROR"))

          # ── Ergebnis speichern ────────────────────────────────────────────────
          OUT = "abuseipdb_api_blacklist.txt"
          sorted_ips = sorted(all_ips, key=lambda e: (tuple(int(x) for x in e.split('/')[0].split('.')), e))

          # ── Leerungsschutz für AbuseIPDB-Ausgabe ─────────────────────────
          # Rate-Limit (Free-Plan: 5 Req/Tag) → exit(0) statt exit(1), da
          # continue-on-error am Step den Build-Abbruch verhindert.
          # Die bestehende abuseipdb_api_blacklist.txt wird als lokaler Feed weiter gelesen.
          import sys
          MIN_ABUSEIPDB = 100
          if len(sorted_ips) < MIN_ABUSEIPDB:
              msg = (f"Nur {len(sorted_ips)} AbuseIPDB-IPs (<{MIN_ABUSEIPDB}) – "
                     f"Rate-Limit erschöpft, behalte bestehende {OUT}")
              print(f"::warning file=update_combined_blacklist.yml::{msg}")
              print(f"WARNUNG: {msg}")
              sys.exit(0)  # exit(0) = kein Fehler; continue-on-error am Step verhindert Build-Block

          with open(OUT, "w", encoding="utf-8") as f:
              f.write("# AbuseIPDB API Blacklist – NETSHIELD\n")
              f.write(f"# Aktualisiert: {now_str}\n")
              f.write(f"# Quellen: 3 API-Keys (Round-Robin)\n")
              f.write(f"# Eintraege: {len(sorted_ips)}\n")
              for idx, count, status in stats:
                  f.write(f"# Key {idx}: {count} IPs [{status}]\n")
              f.write("\n")
              f.write("\n".join(sorted_ips) + "\n")

          print(f"\nAbuseIPDB gesamt: {len(sorted_ips)} einzigartige IPs → {OUT}")
          EOF

      - name: Fetch, discover, learn and build IPv4 lists
        # Skript liegt als separate Datei – kein 887-Zeilen-Heredoc mehr.
        # Bash-Heredoc bei dieser Größe blockiert den Runner komplett (Ursache Run #341-345).
        run: python3 .github/workflows/netshield_update.py


      - name: Save seen_db Cache
        # FIX BUG-AL1: if: always() ergänzt. Ohne dieses Guard wurde der Cache-Save
        # übersprungen wenn der Haupt-Python-Step mit einer unbehandelten Exception
        # crashte (z.B. während json.dump bei Netzwerkproblem). Folge: Downstream-
        # Workflows (Confidence, Score Decay, FP-Checker) griffen auf veralteten Cache
        # zurück – Confidence-Blacklist berechnete dann Scores auf Basis einer
        # möglicherweise Stunden alten seen_db.
        if: always()
        uses: actions/cache/save@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: seen_db.json
          # v2: Kein statischer "latest"-Key mehr. Restore erfolgt über Prefix
          # und bekommt dadurch immer den neuesten verfügbaren Cache.
          key: netshield-seen-db-v2-${{ github.run_id }}

      - name: Commit and Push
        # FIX BUG-AL1 (2/2): if: always() ergänzt. Ohne diesen Guard wurden bei einem
        # Python-Crash weder combined_threat_blacklist_ipv4.txt noch active_blacklist noch
        # seen_db_meta.json committet. Das Repo zeigte dann veraltete Stände obwohl der
        # Workflow technisch gelaufen war. Auch Fehler-Teilstände (z.B. Report ohne
        # Blacklist-Update) sollen sichtbar ins Repo committed werden.
        if: always()
        run: |
          python3 - << 'PYEOF'
          import json, os
          from datetime import datetime, timezone
          now_str = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          meta = {"note": "seen_db.json nur im GitHub Actions Cache (zu gross fuer Repo)", "updated": now_str}
          if os.path.exists("seen_db.json"):
              try:
                  with open("seen_db.json") as f:
                      db = json.load(f)
                  meta["total_ips"] = len(db)
                  meta["size_mb"] = round(os.path.getsize("seen_db.json") / 1024 / 1024, 1)
                  print(f"seen_db: {len(db)} IPs, {meta['size_mb']} MB")
              except Exception as e:
                  meta["error"] = f"seen_db.json nicht lesbar: {e}"
                  meta["size_mb"] = round(os.path.getsize("seen_db.json") / 1024 / 1024, 1)
                  print(f"WARNUNG: seen_db.json korrupt oder nicht lesbar: {e}")
          with open("seen_db_meta.json", "w", encoding="utf-8") as f:
              json.dump(meta, f, indent=2)
          PYEOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add combined_threat_blacklist_ipv4.txt active_blacklist_ipv4.txt combined_threat_blacklist_report.md seen_db_meta.json abuseipdb_api_blacklist.txt community_reported_ips.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "Update Combined Blacklist: $(date -u '+%Y-%m-%d %H:%M') UTC"
            for attempt in 1 2 3 4 5; do
              echo "Push-Versuch $attempt..."
              git fetch origin ${GITHUB_REF_NAME}
              if git rebase -X theirs origin/${GITHUB_REF_NAME}; then
                if git push origin HEAD:${GITHUB_REF_NAME}; then
                  echo "Push erfolgreich (Versuch $attempt)"
                  exit 0
                fi
              else
                git checkout --theirs combined_threat_blacklist_ipv4.txt active_blacklist_ipv4.txt \
                  combined_threat_blacklist_report.md \
                  seen_db_meta.json abuseipdb_api_blacklist.txt \
                  community_reported_ips.txt 2>/dev/null || true
                git add combined_threat_blacklist_ipv4.txt active_blacklist_ipv4.txt \
                  combined_threat_blacklist_report.md seen_db_meta.json \
                  abuseipdb_api_blacklist.txt community_reported_ips.txt 2>/dev/null || true
                GIT_EDITOR=true git rebase --continue 2>/dev/null || git rebase --skip
              fi
              sleep $((attempt * 3))
            done
            echo "FEHLER: Push nach 5 Versuchen fehlgeschlagen"
            exit 1
          fi
