                  # downstream-Steps und Cache-Save ihn finden.
                  write_json_atomic(DB_FILE, db, separators=(",", ":"))
              except Exception as _restore_err:
                  print(f"WARN: Backup-Restore fehlgeschlagen ({_restore_err}) – starte neu", file=sys.stderr)
