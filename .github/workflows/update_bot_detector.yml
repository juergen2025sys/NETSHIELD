name: Bot-Detector Blacklist

on:
  schedule:
    - cron: '45 22 * * *'   # täglich 22:45 UTC (90 Min vor Combined 00:00; verschoben von 23:45 – nur 15min Puffer war zu knapp)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Fetch Bot-Detector Blacklist
        run: |
          python3 << 'EOF'
          import sys as _sys; _sys.path.insert(0, "scripts")
          from netshield_common import (
              load_whitelist, load_fp_set, is_in_fp_set,
              is_valid_public_ipv4, is_valid_public_cidr,
              is_protected_entry, is_whitelisted,
              parse_entries as _parse_entries, calculate_confidence,
              safe_get_date, parse_date, sort_ips, write_ip_list,
              write_text_atomic,
              fetch_url, check_local_feed_age,
              IPV4_RE, CIDR_RE, TIMESTAMP_RE,
          )

          # Init: Whitelist + FP-Set laden
          load_whitelist()
          load_fp_set()

          import urllib.request, urllib.error, json, os, sys, ipaddress, time
          from datetime import datetime, timezone

          now     = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")

          URL         = "https://raw.githubusercontent.com/lula73/bot-detector/refs/heads/master/blacklist.json"
          OUT_FILE    = "bot_detector_blacklist_ipv4.txt"
          REPORT_FILE = "bot_detector_report.md"
          MIN_ENTRIES = 50   # Leerungsschutz

          # ── IP-Validierung ────────────────────────────────────────────────
          # is_valid_public_ipv4() → importiert aus netshield_common
          # FP-Set wird oben via load_fp_set() geladen – is_in_fp_set() greift
          # auf die globalen Strukturen in netshield_common zu. Frühere lokale
          # Re-Implementierung entfernt.

          # is_in_fp_set() → importiert aus netshield_common
          # ── Fetch mit Retry ───────────────────────────────────────────────
          MAX_ATTEMPTS = 3
          data = None
          last_error = None

          for attempt in range(1, MAX_ATTEMPTS + 1):
              try:
                  req = urllib.request.Request(URL, headers={"User-Agent": "NETSHIELD/3.0"})
                  with urllib.request.urlopen(req, timeout=20) as r:
                      data = json.load(r)
                  print(f"  Feed geladen (Versuch {attempt})")
                  break
              except urllib.error.HTTPError as e:
                  last_error = f"HTTP {e.code}: {e.reason}"
                  print(f"  Versuch {attempt}/{MAX_ATTEMPTS} fehlgeschlagen: {last_error}")
              except Exception as e:
                  last_error = str(e)
                  print(f"  Versuch {attempt}/{MAX_ATTEMPTS} fehlgeschlagen: {last_error}")
              if attempt < MAX_ATTEMPTS:
                  time.sleep(2 ** attempt)  # 2s, 4s

          if data is None:
              print(f"FEHLER: Feed nach {MAX_ATTEMPTS} Versuchen nicht erreichbar: {last_error}")
              print("Behalte bestehende bot_detector_blacklist_ipv4.txt")
              # FIX ATOMIC: write_text_atomic statt open("w") – bei Runner-Kill
              # bleibt der Report komplett alt oder komplett neu.
              write_text_atomic(REPORT_FILE,
                  "# Bot-Detector Blacklist – Report\n"
                  f"**Aktualisiert:** {now_str}  \n"
                  f"**Quelle:** [github.com/lula73/bot-detector](https://github.com/lula73/bot-detector)\n\n"
                  "---\n"
                  "## ❌ Fetch-Fehler\n\n"
                  f"Feed nach {MAX_ATTEMPTS} Versuchen nicht erreichbar: `{last_error}`  \n"
                  "Bestehende `bot_detector_blacklist_ipv4.txt` wurde beibehalten.\n\n"
                  f"---\n*Generiert: {now_str}*\n"
              )
              print(f"  {REPORT_FILE} geschrieben (Fehler-Report)")
              msg = f"Feed nach {MAX_ATTEMPTS} Versuchen nicht erreichbar: {last_error}"
              print(f"::warning file=update_bot_detector.yml::{msg}")
              sys.exit(1)

          # ── IPs extrahieren + validieren ──────────────────────────────────
          raw_entries  = data.get("blacklist", [])
          raw_ips      = [entry["ip"] for entry in raw_entries if "ip" in entry]
          valid_ips    = [ip for ip in raw_ips if is_valid_public_ipv4(ip)]
          invalid_ips  = [ip for ip in raw_ips if not is_valid_public_ipv4(ip)]
          unique_ips   = sorted(set(valid_ips),
                                key=lambda ip: tuple(int(o) for o in ip.split(".")))
          # FP-Filter: IPs aus false_positives_set.json entfernen
          fp_before = len(unique_ips)
          unique_ips = [ip for ip in unique_ips if not is_in_fp_set(ip)]
          fp_removed_count = fp_before - len(unique_ips)
          if fp_removed_count:
              print(f"FP-Filter: {fp_removed_count} IPs entfernt")
          # FIX BUG-WL-BOTDETECTOR (2026-04-19): Whitelist-Filter fehlte.
          # Ohne diesen Filter landeten IPs aus whitelist.json (CDN/Cloud-
          # Ranges wie Google, Cloudflare, AWS) in bot_detector_blacklist_ipv4.txt.
          # Downstream (combined) filtert zwar via parse_entries(
          # use_protected_check=True), aber die Zwischendatei selbst ist dann
          # verunreinigt – wer bot_detector_blacklist_ipv4.txt direkt als
          # Firewall-Blocklist nutzt, sperrt damit legitimen CDN-Traffic.
          # Analog zu honeypot_monitor.yml und honeydb_monitor.yml.
          wl_before = len(unique_ips)
          unique_ips = [ip for ip in unique_ips if not is_whitelisted(ip)]
          wl_removed_count = wl_before - len(unique_ips)
          if wl_removed_count:
              print(f"Whitelist-Filter: {wl_removed_count} IPs entfernt")

          print(f"  Roh: {len(raw_ips)} | Gültig: {len(unique_ips)} | "
                f"Ungültig/privat: {len(invalid_ips)} | Duplikate: {len(valid_ips) - len(unique_ips)}")

          # ── Delta berechnen ───────────────────────────────────────────────
          existing = set()
          if os.path.exists(OUT_FILE):
              with open(OUT_FILE) as f:
                  existing = {l.strip() for l in f
                              if l.strip() and not l.startswith("#")}

          new_ips     = set(unique_ips) - existing
          removed_ips = existing - set(unique_ips)

          print(f"  Delta: +{len(new_ips)} neu | -{len(removed_ips)} entfernt")

          # ── Report immer zuerst schreiben ─────────────────────────────────
          lines = []
          lines.append("# Bot-Detector Blacklist – Report")
          lines.append(f"**Aktualisiert:** {now_str}  ")
          lines.append(f"**Quelle:** [github.com/lula73/bot-detector](https://github.com/lula73/bot-detector)\n")
          lines.append("---")
          lines.append("## Ergebnis\n")
          lines.append("| Metrik | Wert |")
          lines.append("|---|---|")
          lines.append(f"| Gesamt IPs | **{len(unique_ips):,}** |")
          lines.append(f"| Neu (heute) | **+{len(new_ips):,}** |")
          lines.append(f"| Entfernt | **-{len(removed_ips):,}** |")
          lines.append(f"| Ungültig/privat gefiltert | {len(invalid_ips):,} |")
          lines.append(f"| Duplikate entfernt | {len(valid_ips) - len(unique_ips):,} |")
          lines.append(f"| Feed-Einträge (roh) | {len(raw_ips):,} |")
          lines.append("")
          lines.append("---")
          lines.append("> ℹ️ Die IPs werden automatisch vom **update_combined_blacklist**-Workflow eingelesen.")
          lines.append(f"\n---\n*Generiert: {now_str}*")

          # FIX ATOMIC: write_text_atomic statt open("w") für Markdown-Report.
          write_text_atomic(REPORT_FILE, "\n".join(lines))
          print(f"  {REPORT_FILE} geschrieben")

          # ── Leerungsschutz ────────────────────────────────────────────────
          # FIX LS4: sys.exit(1) statt sys.exit(0) + GitHub Warning Annotation.
          if len(unique_ips) < MIN_ENTRIES:
              msg = f"Nur {len(unique_ips)} IPs (< {MIN_ENTRIES}) – behalte bestehende Datei"
              print(f"::warning file=update_bot_detector.yml::{msg}")
              print(f"WARNUNG: {msg}")
              sys.exit(1)

          # ── Blacklist schreiben ───────────────────────────────────────────
          # FIX ATOMIC: write_ip_list statt open("w") – atomar + sortiert.
          # unique_ips ist bereits numerisch sortiert (Zeile ~130), write_ip_list
          # sortiert zwar erneut via sort_ips(), das Ergebnis ist identisch.
          write_ip_list(OUT_FILE, unique_ips, header_lines=[
              "NETSHIELD Bot-Detector Blacklist",
              f"Aktualisiert: {now_str}",
              "Quelle: github.com/lula73/bot-detector",
              f"Gesamt: {len(unique_ips)} | +{len(new_ips)} neu | -{len(removed_ips)} entfernt",
          ])

          print(f"  {OUT_FILE}: {len(unique_ips)} IPs geschrieben")

          print(f"\nFERTIG: {len(unique_ips)} Bot-IPs | +{len(new_ips)} neu | -{len(removed_ips)} entfernt")
          EOF

      - name: Commit
        if: always()  # FIX: auch bei Leerungsschutz-Exit den Report committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bot_detector_blacklist_ipv4.txt bot_detector_report.md
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "Bot-Detector Blacklist: $(date -u '+%Y-%m-%d %H:%M') UTC"
            for attempt in 1 2 3 4 5; do
              echo "Push-Versuch $attempt..."
              git fetch origin ${GITHUB_REF_NAME}
              git stash --include-untracked 2>/dev/null || true
              if git rebase -X theirs origin/${GITHUB_REF_NAME}; then
                git stash pop 2>/dev/null || true
                if git push origin HEAD:${GITHUB_REF_NAME}; then
                  echo "Push erfolgreich (Versuch $attempt)"
                  exit 0
                fi
              else
                git stash pop 2>/dev/null || true
                git checkout --theirs bot_detector_blacklist_ipv4.txt \
                  bot_detector_report.md 2>/dev/null || true
                git add bot_detector_blacklist_ipv4.txt \
                  bot_detector_report.md 2>/dev/null || true
                GIT_EDITOR=true git rebase --continue 2>/dev/null || git rebase --skip
              fi
              sleep $((attempt * 3))
            done
            echo "FEHLER: Push nach 5 Versuchen fehlgeschlagen"
            exit 1
          fi
