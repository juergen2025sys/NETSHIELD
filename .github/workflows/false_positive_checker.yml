name: False Positive Checker

on:
  schedule:
    - cron: '0 5 * * *'    # täglich 05:00 UTC
    - cron: '0 13 * * *'   # täglich 13:00 UTC
    - cron: '0 20 * * *'   # täglich 20:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  fp-checker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Restore seen_db Cache
        # FIX WarnB: actions/cache/restore statt actions/cache verwenden.
        # actions/cache würde automatisch einen Post-Job-Save auslösen und dabei
        # die noch UNBEREINIGTE seen_db speichern (bevor der FP-Bereinigungsschritt
        # gelaufen ist). Der explizite Save-Step weiter unten ist die einzige
        # korrekte Schreibquelle nach der FP-Bereinigung.
        uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: seen_db.json
          # FIX RC1: Restore-Key liest den neuesten Combined-Cache (v2-Prefix).
          # Der Save-Key verwendet den fp-Prefix damit FP-Checker Combined NICHT
          # überschreibt – Combined ist immer die einzige Schreibquelle für v2.
          key: netshield-seen-db-fp-${{ github.run_id }}
          restore-keys: |
            netshield-seen-db-v2-
            netshield-seen-db-v1-
            netshield-seen-db-

      - name: Check Blacklist for False Positives
        run: |
          python3 << 'EOF'
          import re
          import os
          import sys
          import json
          import ipaddress
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")

          print("Starte False Positive Prüfung (Whitelist-CIDR)...")

          # ── Whitelist: IPs/CIDRs die NIE auf die Blacklist kommen ─────────
          # Single Source of Truth: whitelist.json (synchron mit update_combined_blacklist)
          try:
              with open(".github/workflows/whitelist.json", encoding="utf-8") as _wl_f:
                  WHITELIST_CIDRS = json.load(_wl_f)["entries"]
          except Exception as _wl_err:
              _msg = f"whitelist.json nicht ladbar: {_wl_err} – FP-Check abgebrochen"
              print(f"::error file=false_positive_checker.yml::{_msg}")
              print(f"FEHLER: {_msg}")
              sys.exit(1)

          whitelist_networks = []
          for cidr in WHITELIST_CIDRS:
              try:
                  whitelist_networks.append(ipaddress.ip_network(cidr, strict=False))
              except Exception as _suppressed:
                  print(f"WARN: suppressed Exception: {_suppressed}", file=sys.stderr)

          def is_whitelisted_entry(value):
              try:
                  candidate = value.strip()
                  if not candidate:
                      return False
                  if '/' in candidate:
                      net = ipaddress.ip_network(candidate, strict=False)
                      return any(net.overlaps(w) for w in whitelist_networks)
                  addr = ipaddress.ip_address(candidate)
                  return any(addr in net for net in whitelist_networks)
              except Exception:
                  return False

          # ── Blacklist laden ───────────────────────────────────────────────
          BLACKLIST = "combined_threat_blacklist_ipv4.txt"
          if not os.path.exists(BLACKLIST):
              msg = f"{BLACKLIST} nicht gefunden – Prüfung übersprungen."
              print(f"::warning file=false_positive_checker.yml::{msg}")
              print(f"FEHLER: {msg}")
              sys.exit(1)

          with open(BLACKLIST) as f:
              lines_raw = f.readlines()

          blacklist_ips = [l.strip() for l in lines_raw if l.strip() and not l.startswith("#")]
          print(f"\nBlacklist geladen: {len(blacklist_ips)} IPs")
          print("Prüfe auf False Positives...")

          false_positives = []
          whitelist_hits  = []

          for ip in blacklist_ips:
              if is_whitelisted_entry(ip):
                  whitelist_hits.append((ip, "Bekannte legitime IP-Range (CDN/Cloud)"))
                  false_positives.append(ip)

          print(f"  Fertig. {len(false_positives)} False Positives gefunden.")

          # ── FIX #1/#4: Nicht mehr combined_threat_blacklist_ipv4.txt direkt schreiben.
          # Stattdessen false_positives_set.json speichern – update_combined_blacklist
          # liest diese Datei beim nächsten Run und filtert die IPs beim Ingest heraus.
          # Vorteile:
          #   1. Keine Race-Condition mehr mit combined (der als einzige Quelle der
          #      Wahrheit für combined_threat_blacklist_ipv4.txt gilt).
          #   2. HQ-IPs werden sauber behandelt: combined entscheidet beim nächsten
          #      Lauf ob ein HQ-Feed die IP erneut meldet – kein ewiger Add/Remove-Zyklus.
          fp_set = set(false_positives)
          FP_JSON = "false_positives_set.json"

          existing_fp = set()
          if os.path.exists(FP_JSON):
              try:
                  with open(FP_JSON) as f:
                      data = json.load(f)
                  existing_fp = set(data.get("ips", []))
              except Exception:
                  existing_fp = set()

          # Leerungsschutz: wenn combined_threat_blacklist_ipv4.txt kurzzeitig leer oder
          # stark geschrumpft ist (z.B. nach fehlgeschlagenem Combined-Run), darf der
          # Schnitt-Filter keine legitimen FP-Einträge aus existing_fp löschen.
          # Untergrenze: mind. 1000 IPs → sonst existing_fp NICHT per Schnitt beschneiden.
          MIN_BLACKLIST_FOR_STALE_CLEANUP = 1000
          if len(blacklist_ips) >= MIN_BLACKLIST_FOR_STALE_CLEANUP:
              merged_fp = (existing_fp | fp_set) & set(blacklist_ips)
          else:
              # Blacklist zu klein → nur neue FPs hinzufügen, bestehende NICHT entfernen
              merged_fp = existing_fp | fp_set
              print(f"WARNUNG: Blacklist hat nur {len(blacklist_ips)} Einträge (<{MIN_BLACKLIST_FOR_STALE_CLEANUP}) "
                    f"– existing_fp wird nicht per Schnitt bereinigt (Datenverlust-Schutz)")
          removed_stale_fp = (existing_fp | fp_set) - merged_fp
          with open(FP_JSON, "w", encoding="utf-8") as f:
              json.dump({
                  "updated":  now_str,
                  "count":    len(merged_fp),
                  "ips":      sorted(merged_fp),
              }, f, indent=2)
          print(f"false_positives_set.json: {len(merged_fp)} IPs gespeichert "
                f"({len(fp_set)} neu erkannt, {len(existing_fp)} bereits vorhanden, {len(removed_stale_fp)} veraltete entfernt)")

          # ── seen_db wird NICHT mehr hier bereinigt ─────────────────────
          # Der combined-Workflow filtert FP-IPs beim nächsten Lauf selbst
          # über _is_in_fp_set() anhand von false_positives_set.json.
          # Der fp-Cache-Prefix (netshield-seen-db-fp-*) wurde von keinem
          # anderen Workflow gelesen – die Bereinigung war wirkungslos.

          # ── False Positive Log ────────────────────────────────────────────
          with open("false_positives_log.txt", "a", encoding="utf-8") as f:
              f.write(f"\n# Scan: {now_str} – {len(fp_set)} neue FPs\n")
              for ip in sorted(fp_set):
                  f.write(f"{ip}\n")

          # ── Report ────────────────────────────────────────────────────────
          lines = []
          lines.append("# False Positive Checker – Report")
          lines.append(f"**Aktualisiert:** {now_str}\n")
          lines.append("---")
          lines.append("## Ergebnis\n")
          lines.append("| Metrik | Wert |")
          lines.append("|---|---|")
          lines.append(f"| Geprüfte IPs (gesamt) | {len(blacklist_ips)} |")
          lines.append(f"| Whitelist-Treffer (dieser Run) | **{len(whitelist_hits)}** |")
          lines.append(f"| FP-Set gesamt (kumuliert) | **{len(merged_fp)}** |")
          lines.append("")
          lines.append("> ℹ️ FPs werden nicht mehr direkt aus `combined_threat_blacklist_ipv4.txt` entfernt.")
          lines.append("> `false_positives_set.json` wird beim nächsten `update_combined_blacklist`-Lauf über `_is_in_fp_set()` angewendet.")

          if whitelist_hits:
              lines.append("\n## Whitelist-Treffer\n")
              lines.append("| IP | Grund |")
              lines.append("|---|---|")
              for ip, reason in whitelist_hits[:20]:
                  lines.append(f"| `{ip}` | {reason} |")

          lines.append(f"\n---\n*Generiert: {now_str}*")

          with open("false_positive_report.md", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))
          print("false_positive_report.md geschrieben")
          EOF

      # seen_db Cache Save entfernt – FP-Checker modifiziert seen_db nicht mehr.
      # Combined filtert FPs selbst über _is_in_fp_set(). Der fp-Prefix-Cache
      # (netshield-seen-db-fp-*) wurde von keinem Workflow gelesen.

      - name: Commit
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # combined_threat_blacklist_ipv4.txt wird NICHT mehr durch diesen Workflow
          # verändert – nur noch false_positives_set.json, Log und Report.
          git add false_positives_log.txt false_positive_report.md false_positives_set.json
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            # FIX RACE4: Append-only Log vor Rebase sichern (analog RACE3 in community_ip_report)
            git diff HEAD -- false_positives_log.txt | grep '^+[^+]' | sed 's/^+//' > /tmp/local_fp_log_appends.txt 2>/dev/null || true
            git commit -m "False Positive Check: $(date -u '+%Y-%m-%d %H:%M') UTC"
            for attempt in 1 2 3 4 5; do
              echo "Push-Versuch $attempt..."
              git fetch origin ${GITHUB_REF_NAME}
              if git rebase -X theirs origin/${GITHUB_REF_NAME}; then
                if git push origin HEAD:${GITHUB_REF_NAME}; then
                  echo "Push erfolgreich (Versuch $attempt)"
                  exit 0
                fi
              else
                git checkout --theirs \
                  false_positives_log.txt \
                  false_positive_report.md \
                  false_positives_set.json 2>/dev/null || true
                # FIX RACE4: Gesicherte Log-Appends nach --theirs erneut anfügen
                if [ -s /tmp/local_fp_log_appends.txt ]; then
                  cat /tmp/local_fp_log_appends.txt >> false_positives_log.txt
                fi
                git add \
                  false_positives_log.txt \
                  false_positive_report.md \
                  false_positives_set.json 2>/dev/null || true
                GIT_EDITOR=true git rebase --continue 2>/dev/null || git rebase --skip
              fi
              sleep $((attempt * 3))
            done
            echo "FEHLER: Push nach 5 Versuchen fehlgeschlagen"
            exit 1
          fi
