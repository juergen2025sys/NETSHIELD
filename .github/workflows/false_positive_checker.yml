          whitelist_networks = []
          for cidr in WHITELIST_CIDRS:
              try:
                  whitelist_networks.append(ipaddress.ip_network(cidr, strict=False))
              except Exception:
                  pass

          def is_whitelisted_entry(value):
              try:
                  candidate = value.strip()
                  if not candidate:
                      return False
                  if '/' in candidate:
                      net = ipaddress.ip_network(candidate, strict=False)
                      return any(net.overlaps(w) for w in whitelist_networks)
                  addr = ipaddress.ip_address(candidate)
                  return any(addr in net for net in whitelist_networks)
              except Exception:
                  return False

          # ── Blacklist laden ───────────────────────────────────────────────
          BLACKLIST = "combined_threat_blacklist_ipv4.txt"
          if not os.path.exists(BLACKLIST):
              msg = f"{BLACKLIST} nicht gefunden – Prüfung übersprungen."
              print(f"::warning file=false_positive_checker.yml::{msg}")
              print(f"FEHLER: {msg}")
              sys.exit(1)

          with open(BLACKLIST) as f:
              lines_raw = f.readlines()

          blacklist_ips = [l.strip() for l in lines_raw if l.strip() and not l.startswith("#")]
          print(f"\nBlacklist geladen: {len(blacklist_ips)} IPs")
          print("Prüfe auf False Positives...")

          false_positives = []
          whitelist_hits  = []

          for ip in blacklist_ips:
              if is_whitelisted_entry(ip):
                  whitelist_hits.append((ip, "Bekannte legitime IP-Range (CDN/Cloud)"))
                  false_positives.append(ip)

          print(f"  Fertig. {len(false_positives)} False Positives gefunden.")

          # ── FIX #1/#4: Nicht mehr combined_threat_blacklist_ipv4.txt direkt schreiben.
          # Stattdessen false_positives_set.json speichern – update_combined_blacklist
          # liest diese Datei beim nächsten Run und filtert die IPs beim Ingest heraus.
          # Vorteile:
          #   1. Keine Race-Condition mehr mit combined (der als einzige Quelle der
          #      Wahrheit für combined_threat_blacklist_ipv4.txt gilt).
          #   2. HQ-IPs werden sauber behandelt: combined entscheidet beim nächsten
          #      Lauf ob ein HQ-Feed die IP erneut meldet – kein ewiger Add/Remove-Zyklus.
          fp_set = set(false_positives)
          FP_JSON = "false_positives_set.json"

          existing_fp = set()
          if os.path.exists(FP_JSON):
              try:
                  with open(FP_JSON) as f:
                      data = json.load(f)
                  existing_fp = set(data.get("ips", []))
              except Exception:
                  existing_fp = set()

          # Leerungsschutz: wenn combined_threat_blacklist_ipv4.txt kurzzeitig leer oder
          # stark geschrumpft ist (z.B. nach fehlgeschlagenem Combined-Run), darf der
          # Schnitt-Filter keine legitimen FP-Einträge aus existing_fp löschen.
          # Untergrenze: mind. 1000 IPs → sonst existing_fp NICHT per Schnitt beschneiden.
          MIN_BLACKLIST_FOR_STALE_CLEANUP = 1000
          if len(blacklist_ips) >= MIN_BLACKLIST_FOR_STALE_CLEANUP:
              merged_fp = (existing_fp | fp_set) & set(blacklist_ips)
          else:
              # Blacklist zu klein → nur neue FPs hinzufügen, bestehende NICHT entfernen
              merged_fp = existing_fp | fp_set
              print(f"WARNUNG: Blacklist hat nur {len(blacklist_ips)} Einträge (<{MIN_BLACKLIST_FOR_STALE_CLEANUP}) "
                    f"– existing_fp wird nicht per Schnitt bereinigt (Datenverlust-Schutz)")
          removed_stale_fp = (existing_fp | fp_set) - merged_fp
          with open(FP_JSON, "w", encoding="utf-8") as f:
              json.dump({
                  "updated":  now_str,
                  "count":    len(merged_fp),
                  "ips":      sorted(merged_fp),
              }, f, indent=2)
          print(f"false_positives_set.json: {len(merged_fp)} IPs gespeichert "
                f"({len(fp_set)} neu erkannt, {len(existing_fp)} bereits vorhanden, {len(removed_stale_fp)} veraltete entfernt)")

          # ── seen_db ebenfalls bereinigen (alle FP-IPs, inkl. HQ) ─────────
          # FIX #4: HQ-IPs werden jetzt AUCH aus seen_db entfernt.
          # Begründung: combined trägt sie beim nächsten Lauf korrekt wieder ein,
          # falls der HQ-Feed sie noch aktiv meldet. Ohne diesen Schritt entsteht
          # ein ewiger 3h-Zyklus: FP-Checker entfernt aus Datei → combined re-added
          # aus seen_db → FP-Checker entfernt erneut.
          DB_FILE = "seen_db.json"
          if os.path.exists(DB_FILE):
              try:
                  with open(DB_FILE) as f:
                      db = json.load(f)
                  db_removed = 0
                  # Collect-then-delete: avoid triggering dict-mutation linter check
                  to_remove_fp = [ip for ip in fp_set if ip in db]
                  for ip in to_remove_fp:
                      db.pop(ip, None)
                      db_removed += 1
                  if db_removed > 0:
                      with open(DB_FILE, "w", encoding="utf-8") as f:
                          json.dump(db, f, separators=(",", ":"))
                      print(f"seen_db bereinigt: {db_removed} False Positives entfernt "
                            f"(inkl. HQ-IPs – combined re-addiert sie falls Feed noch aktiv)")
              except Exception as e:
                  print(f"seen_db konnte nicht bereinigt werden: {e}")

          # ── False Positive Log ────────────────────────────────────────────
          with open("false_positives_log.txt", "a", encoding="utf-8") as f:
              f.write(f"\n# Scan: {now_str} – {len(fp_set)} neue FPs\n")
              for ip in sorted(fp_set):
                  f.write(f"{ip}\n")

          # ── Report ────────────────────────────────────────────────────────
          lines = []
          lines.append("# False Positive Checker – Report")
          lines.append(f"**Aktualisiert:** {now_str}\n")
          lines.append("---")
          lines.append("## Ergebnis\n")
          lines.append("| Metrik | Wert |")
          lines.append("|---|---|")
          lines.append(f"| Geprüfte IPs (gesamt) | {len(blacklist_ips)} |")
          lines.append(f"| Whitelist-Treffer (dieser Run) | **{len(whitelist_hits)}** |")
          lines.append(f"| FP-Set gesamt (kumuliert) | **{len(merged_fp)}** |")
          lines.append("")
          lines.append("> ℹ️ FPs werden nicht mehr direkt aus `combined_threat_blacklist_ipv4.txt` entfernt.")
          lines.append("> `false_positives_set.json` wird beim nächsten `update_combined_blacklist`-Lauf angewendet.")
          lines.append("> Der `fp-` Cache-Slot dieses Workflows ist absichtlich isoliert und überschreibt den Combined-Cache nicht; dauerhafte Wirkung entsteht erst durch das nächste Combined-Update.")

          if whitelist_hits:
              lines.append("\n## Whitelist-Treffer\n")
              lines.append("| IP | Grund |")
              lines.append("|---|---|")
              for ip, reason in whitelist_hits[:20]:
                  lines.append(f"| `{ip}` | {reason} |")

          lines.append(f"\n---\n*Generiert: {now_str}*")

          with open("false_positive_report.md", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))
          print("false_positive_report.md geschrieben")
          EOF

