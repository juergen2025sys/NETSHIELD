              "212.227.126.220","212.227.126.221","212.227.126.222","212.227.126.223",
              "212.227.126.224","212.227.126.225","212.227.126.226","212.227.126.227",
              "212.227.15.50", "212.227.15.52",
              "212.227.15.7",  "212.227.15.8",  "212.227.17.7",  "212.227.17.27",
              "185.67.36.0/24",
              "80.241.60.0/24",
              "194.25.134.60", "194.25.134.61", "194.25.134.62",
              "194.25.134.80", "194.25.134.81",
              "64.18.0.0/20", "64.233.160.0/19", "66.102.0.0/20",
              "66.249.80.0/20", "72.14.192.0/18", "108.177.8.0/21",
              "173.194.0.0/16", "207.126.144.0/20", "209.85.128.0/17",
              "216.58.192.0/19", "216.239.32.0/19",
              "40.92.0.0/15", "40.107.0.0/16", "52.100.0.0/14",
              "52.238.78.88/32", "104.47.0.0/17",
              "98.136.0.0/15", "66.196.0.0/19", "66.228.160.0/19", "74.6.232.0/21",
