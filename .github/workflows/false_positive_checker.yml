name: False Positive Checker

on:
  schedule:
    - cron: '0 5 * * *'    # täglich 05:00 UTC
    - cron: '0 13 * * *'   # täglich 13:00 UTC
    - cron: '0 20 * * *'   # täglich 20:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  fp-checker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Restore seen_db Cache
        # FIX WarnB: actions/cache/restore statt actions/cache verwenden.
        # actions/cache würde automatisch einen Post-Job-Save auslösen und dabei
        # die noch UNBEREINIGTE seen_db speichern (bevor der FP-Bereinigungsschritt
        # gelaufen ist). Der explizite Save-Step weiter unten ist die einzige
        # korrekte Schreibquelle nach der FP-Bereinigung.
        uses: actions/cache/restore@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: seen_db.json
          # FIX RC1: Restore-Key liest den neuesten Combined-Cache (v2-Prefix).
          # Der Save-Key verwendet den fp-Prefix damit FP-Checker Combined NICHT
          # überschreibt – Combined ist immer die einzige Schreibquelle für v2.
          key: netshield-seen-db-fp-${{ github.run_id }}
          restore-keys: |
            netshield-seen-db-v2-
            netshield-seen-db-v1-
            netshield-seen-db-

      - name: Check Blacklist for False Positives
        run: |
          python3 << 'EOF'
          import re
          import os
          import sys
          import json
          import ipaddress
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")

          print("Starte False Positive Prüfung (Whitelist-CIDR)...")

