          whitelist_networks = []
          for cidr in WHITELIST_CIDRS:
              try:
                  whitelist_networks.append(ipaddress.ip_network(cidr, strict=False))
              except:
                  pass

          def is_whitelisted(ip):
              try:
                  addr = ipaddress.ip_address(ip)
                  return any(addr in net for net in whitelist_networks)
              except:
                  return False

          # ── Blacklist laden ───────────────────────────────────────────────
          BLACKLIST = "combined_threat_blacklist_ipv4.txt"
          if not os.path.exists(BLACKLIST):
              print(f"FEHLER: {BLACKLIST} nicht gefunden!")
              sys.exit(1)

          with open(BLACKLIST) as f:
              lines_raw = f.readlines()

          blacklist_ips = []
          for line in lines_raw:
              ip = line.strip()
              if ip and not ip.startswith("#"):
                  blacklist_ips.append(ip)

          print(f"\nBlacklist geladen: {len(blacklist_ips)} IPs")
          print("Prüfe auf False Positives...")

          # ── False-Positive-Erkennung (nur Whitelist-CIDR) ────────────────
          false_positives   = []
          whitelist_hits    = []
          reverse_dns_legit = []

          print(f"Prüfe {len(blacklist_ips)} IPs gegen Whitelist...")
          for i, ip in enumerate(blacklist_ips):
              if is_whitelisted(ip):
                  whitelist_hits.append((ip, "Bekannte legitime IP-Range (CDN/Cloud)"))
                  false_positives.append(ip)

          print(f"  Fertig. {len(false_positives)} False Positives gefunden.")

          print(f"\nFalse Positives gefunden: {len(false_positives)}")
          print(f"  Whitelist-Treffer:    {len(whitelist_hits)}")
          print(f"  Reverse-DNS-Legit:    {len(reverse_dns_legit)}")

          # ── False Positives aus Blacklist entfernen ───────────────────────
          fp_set = set(false_positives)
          cleaned_lines = []
          removed_count = 0

          for line in lines_raw:
              ip = line.strip()
              if ip and not ip.startswith("#") and ip in fp_set:
                  removed_count += 1
                  continue  # rauslassen
              cleaned_lines.append(line)

          if removed_count > 0:
              with open(BLACKLIST, "w", encoding="utf-8") as f:
                  f.writelines(cleaned_lines)
              print(f"Blacklist bereinigt: {removed_count} False Positives entfernt")

              # ── seen_db ebenfalls bereinigen ──────────────────────────────
              # Ohne diesen Schritt trägt combined beim nächsten Lauf die
              # Whitelist-IPs sofort wieder ein → Bereinigung wäre wirkungslos.
              # FIX Bug2: HQ-IPs NICHT aus seen_db löschen!
              # HQ-Feeds (Feodo, Talos etc.) melden diese IPs weiterhin → combined
              # würde sie im nächsten Lauf sofort wieder eintragen (Lösch-Reinsert-Zyklus).
              # Stattdessen: HQ-IPs bleiben in seen_db, werden aber aus der Blacklist-Datei
              # entfernt – combined schreibt sie beim nächsten Lauf ggf. wieder rein,
              # was korrekt ist wenn der HQ-Feed sie aktiv meldet.
              DB_FILE = "seen_db.json"
              if os.path.exists(DB_FILE):
                  import json
                  try:
                      with open(DB_FILE) as f:
                          db = json.load(f)
                      db_removed = 0
                      db_skipped_hq = 0
                      for ip in fp_set:
                          if ip in db:
                              if db[ip].get("hq", False):
                                  db_skipped_hq += 1
                                  print(f"  SKIP seen_db-Löschung für {ip} (HQ-IP)")
                                  continue
                              del db[ip]
                              db_removed += 1
                      if db_removed > 0:
                          with open(DB_FILE, "w") as f:
                              json.dump(db, f, separators=(",", ":"))
                          print(f"seen_db bereinigt: {db_removed} False Positives entfernt"
                                f" | {db_skipped_hq} HQ-IPs behalten")
                  except Exception as e:
                      print(f"seen_db konnte nicht bereinigt werden: {e}")
          else:
              print("Keine False Positives gefunden")

          # ── False Positive Liste speichern ────────────────────────────────
          with open("false_positives_log.txt", "a", encoding="utf-8") as f:
              f.write(f"\n# Scan: {now_str} – {removed_count} entfernt\n")
              for ip in false_positives:
                  f.write(f"{ip}\n")

          # ── Report ────────────────────────────────────────────────────────
          lines = []
          lines.append("# False Positive Checker – Report")
          lines.append(f"**Aktualisiert:** {now_str}\n")
          lines.append("---")
          lines.append("## Ergebnis\n")
          lines.append(f"| Metrik | Wert |")
          lines.append(f"|---|---|")
          lines.append(f"| Geprüfte IPs (gesamt) | {len(blacklist_ips)} |")
          lines.append(f"| Whitelist-Treffer | **{len(whitelist_hits)}** |")
          lines.append(f"| Gesamt entfernt | **{removed_count}** |")

          if whitelist_hits:
              lines.append("")
              lines.append("## Whitelist-Treffer\n")
              lines.append("| IP | Grund |")
              lines.append("|---|---|")
              for ip, reason in whitelist_hits[:20]:
                  lines.append(f"| `{ip}` | {reason} |")

          lines.append(f"\n---\n*Generiert: {now_str}*")

          with open("false_positive_report.md", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))
          print("false_positive_report.md geschrieben")
          EOF

      - name: Save seen_db Cache (nach FP-Bereinigung)
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: seen_db.json
          key: netshield-seen-db-v1-fp-${{ github.run_id }}

      - name: Save seen_db Cache (latest alias)
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: seen_db.json
          key: netshield-seen-db-v1-latest

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add false_positives_log.txt false_positive_report.md combined_threat_blacklist_ipv4.txt
          git diff --staged --quiet || git commit -m "False Positive Check abgeschlossen [$(date -u '+%Y-%m-%d %H:%M') UTC]"
          for attempt in 1 2 3 4 5; do
            echo "Push-Versuch $attempt..."
            git fetch origin ${GITHUB_REF_NAME}
            if git rebase -X theirs origin/${GITHUB_REF_NAME}; then
              if git push origin HEAD:${GITHUB_REF_NAME}; then
                echo "Push erfolgreich (Versuch $attempt)"
                exit 0
              fi
            else
              git checkout --theirs false_positives_log.txt false_positive_report.md \
                combined_threat_blacklist_ipv4.txt 2>/dev/null || true
              git add false_positives_log.txt false_positive_report.md \
                combined_threat_blacklist_ipv4.txt 2>/dev/null || true
              GIT_EDITOR=true git rebase --continue 2>/dev/null || git rebase --skip
            fi
            sleep $((attempt * 3))
          done
          echo "FEHLER: Push nach 5 Versuchen fehlgeschlagen"
          exit 1
