name: False Positive Checker

on:
  schedule:
    - cron: '0 5 * * *'    # täglich 05:00 UTC (60 Min vor Combined um 06:00 – verhindert Git-Konflikt)
    - cron: '0 13 * * *'   # täglich 13:00 UTC (60 Min Puffer vor Combined um 15:00)
    - cron: '0 20 * * *'   # täglich 20:00 UTC (60 Min Puffer vor Combined um 21:00)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none


concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  fp-checker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Restore seen_db Cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: seen_db.json
          key: netshield-seen-db-v1-latest
          restore-keys: |
            netshield-seen-db-v1-
            netshield-seen-db-

