              "82.165.159.2",  "82.165.159.3",  "82.165.159.4",
              "82.165.159.34", "82.165.159.35", "82.165.159.45",
              "217.72.192.73", "217.72.192.74", "217.72.192.75",
              "212.227.17.13", "212.227.17.24",
              "212.227.126.130", "212.227.126.131", "212.227.126.133",
              "212.227.126.134", "212.227.126.135", "212.227.126.187",
              "74.208.4.194",  "74.208.4.195",  "74.208.4.196",  "74.208.4.197",
              "82.165.159.5",  "82.165.159.6",  "82.165.159.7",
              "82.165.159.8",  "82.165.159.9",  "82.165.159.10",
              "82.165.159.36", "82.165.159.37", "82.165.159.38",
              "82.165.159.39", "82.165.159.43", "82.165.159.44",
              "82.165.159.132","82.165.159.133","82.165.159.134",
              "217.72.192.100","217.72.192.101","217.72.192.102",
              "212.227.15.22", "212.227.15.31", "212.227.15.32",
              "212.227.15.56", "212.227.15.57", "212.227.15.58",
              "212.227.17.3",  "212.227.17.14", "212.227.17.25",
